<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUE · Test Adaptativo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f4;color:#1a1a18;min-height:100vh;padding:1rem}
.wrap{max-width:780px;margin:0 auto}
h1{font-size:17px;font-weight:600;margin-bottom:1rem;color:#1a1a18}
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.8rem}
.nb{padding:5px 12px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#5f5e5a;font-size:13px;cursor:pointer}
.nb.active{background:#e6f1fb;color:#185fa5;border-color:#185fa5}
.nb:hover:not(.active){background:#f1efe8}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.8rem}
.stat{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:.6rem .8rem;text-align:center}
.stat-n{font-size:20px;font-weight:600}
.stat-l{font-size:11px;color:#888780;margin-top:1px}
.unit-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.8rem}
.ubar{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:7px 9px;cursor:pointer}
.ubar:hover{border-color:#185fa5}
.ubar-title{font-size:11px;color:#888780;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ubar-track{height:5px;background:#f1efe8;border-radius:3px;overflow:hidden;margin-bottom:2px}
.ubar-fill{height:100%;border-radius:3px;transition:width .3s}
.ubar-pct{font-size:10px;color:#888780}
.prog-wrap{height:3px;background:#d3d1c7;border-radius:2px;margin-bottom:.8rem;overflow:hidden}
.prog-bar{height:100%;background:#185fa5;border-radius:2px;transition:width .3s}
.ctrl{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap}
.btn{padding:6px 13px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;font-size:13px;cursor:pointer}
.btn:hover{background:#f1efe8}
.btn.active{background:#e6f1fb;color:#185fa5;border-color:#185fa5}
.btn.danger{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.qcard{background:#fff;border:1.5px solid #d3d1c7;border-radius:12px;padding:1.1rem;margin-bottom:.9rem;transition:border-color .15s,background .15s}
.qcard.ok{border-color:#1d9e75;background:#eaf3de}
.qcard.fail{border-color:#e24b4a;background:#fcebeb}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.qbadge{font-size:11px;color:#888780;background:#f1efe8;padding:2px 7px;border-radius:5px}
.qmeta{display:flex;gap:5px;align-items:center}
.qpct{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.qnum{font-size:10px;color:#b4b2a9}
.qtext{font-size:14px;line-height:1.65;margin-bottom:.8rem;font-weight:600}
.opts{display:flex;flex-direction:column;gap:4px}
.opt{text-align:left;padding:9px 12px;border:1px solid #d3d1c7;border-radius:7px;background:#fff;cursor:pointer;font-size:13px;line-height:1.5;font-family:inherit}
.opt:hover:not(:disabled){background:#f1efe8}
.opt.c-ok{background:#eaf3de;border-color:#1d9e75;color:#0f6e56;font-weight:600}
.opt.c-fail{background:#fcebeb;border-color:#e24b4a;color:#a32d2d}
.exp{margin-top:.6rem;padding:8px 11px;background:#f1efe8;border-radius:7px;font-size:12px;color:#444441;line-height:1.6;border-left:3px solid #185fa5}
.empty{color:#888780;font-size:14px;padding:3rem;text-align:center;background:#fff;border-radius:12px;border:1px solid #d3d1c7}
.sep{font-size:12px;font-weight:600;color:#888780;margin:1.2rem 0 .4rem;padding-bottom:.3rem;border-bottom:1px solid #d3d1c7}
</style>
</head>
<body>
<div class="wrap">
<h1>📚 DUE · Test Adaptativo — Derecho de la Unión Europea</h1>
<div class="nav" id="nav"></div>
<div class="stats-grid" id="stats"></div>
<div class="unit-bars" id="ubars"></div>
<div class="prog-wrap"><div class="prog-bar" id="prog"></div></div>
<div class="ctrl" id="ctrl"></div>
<div id="questions"></div>
</div>
<script>
const BANK=[
// UD1 ─────────────────────────────────────────────────────────────────────
{u:1,t:"¿Cuál fue el doble objetivo del Plan Marshall (1948)?",o:["Reconstruir Europa y expandir la influencia soviética","Ayudar financieramente a Europa manteniendo regímenes democráticos, facilitando la expansión económica de EE.UU.","Crear la OTAN y financiar la CECA","Establecer el mercado común europeo y eliminar aranceles"],c:1,e:"El Plan Marshall buscaba la reconstrucción europea bajo garantía democrática y servía a los intereses económicos de EE.UU. Para gestionarlo se creó la OECE."},
{u:1,t:"¿Cuándo se firmó el Tratado de París que creó la CECA y quiénes fueron sus firmantes originales?",o:["25 de marzo de 1957; los seis: Francia, Alemania, Italia y Benelux","18 de abril de 1951; los seis: Francia, Alemania Federal, Italia, Bélgica, Países Bajos y Luxemburgo","9 de mayo de 1950; solo Francia y Alemania","4 de enero de 1960; los miembros de la EFTA"],c:1,e:"El Tratado de París se firmó el 18 de abril de 1951 y entró en vigor el 25 de julio de 1952. Lo firmaron los 'seis fundadores': Francia, Alemania Federal, Italia y el Benelux (Bélgica, Países Bajos y Luxemburgo)."},
{u:1,t:"¿Qué dos Comunidades crearon los Tratados de Roma de 1957?",o:["CECA y EFTA","CEE (Comunidad Económica Europea) y EURATOM (Comunidad Europea de la Energía Atómica)","CEE y OTAN","CECA y CEE"],c:1,e:"Los Tratados de Roma (25 de marzo de 1957, en vigor el 1 de enero de 1958) crearon la CEE y EURATOM. Junto con la CECA ya existente, configuraron las tres Comunidades Europeas originales."},
{u:1,t:"¿Qué es el Tratado de Bruselas de 1965 y cuál fue su objetivo principal?",o:["El tratado que creó el mercado único europeo","El Tratado de Fusión de los Ejecutivos: unificó las instituciones de la CECA, CEE y EURATOM en órganos comunes únicos","El tratado de cooperación militar entre Francia y el Reino Unido","El tratado que incorporó a España y Portugal a las Comunidades Europeas"],c:1,e:"El Tratado de Bruselas (también llamado Tratado de Fusión o de Fusión de los Ejecutivos, firmado el 8 de abril de 1965) unificó los órganos ejecutivos de las tres Comunidades en instituciones comunes, simplificando la estructura comunitaria."},
{u:1,t:"¿Cuándo y por qué se introdujo el sufragio universal directo para el Parlamento Europeo?",o:["En 1952, desde la creación de la CECA, para garantizar la legitimidad democrática","En 1979, como consecuencia de las ampliaciones de los años 70 y la necesidad de mayor legitimación democrática","En 1992 con el Tratado de Maastricht, cuando se creó la ciudadanía europea","En 1986 con el Acta Única, al mismo tiempo que el mercado interior"],c:1,e:"El sufragio universal directo para la Eurocámara se introdujo en 1979, coincidiendo con la primera ampliación (Reino Unido, Dinamarca e Irlanda en 1973) y la necesidad de reforzar la legitimidad democrática de las Comunidades."},
{u:1,t:"¿Cuándo ingresaron España y Portugal en las Comunidades Europeas?",o:["1981, junto con Grecia","1986, tras largas negociaciones especialmente en materia industrial, pesquera y agrícola","1973, junto con el Reino Unido y Dinamarca","1995, junto con Austria, Suecia y Finlandia"],c:1,e:"España y Portugal ingresaron en las Comunidades Europeas en 1986 tras difíciles negociaciones. Grecia lo había hecho en 1981 como décimo Estado miembro."},
{u:1,t:"¿Qué es la EFTA (AELC) y por qué se creó?",o:["La organización de cooperación económica creada para gestionar el Plan Marshall","La Asociación Europea de Libre Comercio creada en 1960 por el Reino Unido y otros Estados que no ingresaron en las Comunidades Europeas, para mitigar los efectos negativos de quedar fuera del mercado común","La organización predecesora de la OTAN creada tras la Segunda Guerra Mundial","El instrumento jurídico para la creación del euro como moneda única"],c:1,e:"La EFTA se creó el 4 de enero de 1960 en Estocolmo, liderada por el Reino Unido, para agrupar a los Estados que no entraron en las Comunidades. Solo establecía libre comercio de productos industriales, sin cesión de soberanía."},
{u:1,t:"¿Qué fue la 'Gran Ampliación' de 2004 y qué diez países se incorporaron?",o:["La ampliación de 1986 que incluyó a España, Portugal y Grecia","La incorporación en mayo de 2004 de Polonia, Estonia, Letonia, Lituania, Hungría, República Checa, Eslovaquia, Eslovenia, Malta y Chipre","La ampliación de 1995 con Austria, Suecia y Finlandia","La incorporación de Rumanía, Bulgaria y Croacia entre 2007 y 2013"],c:1,e:"La quinta ampliación (mayo 2004) fue la mayor de la historia de la UE, con la incorporación de diez nuevos Estados, principalmente de Europa central y oriental, más Malta y Chipre."},
{u:1,t:"¿Cuándo salió efectivamente el Reino Unido de la Unión Europea y qué porcentaje votó a favor en el referéndum de 2016?",o:["Salió el 23 de junio de 2016 con el 51,9% a favor del Brexit","El referéndum fue el 23 de junio de 2016 (51,9% a favor); la salida efectiva se produjo el 31 de enero de 2020","Salió el 29 de marzo de 2019 tras la primera notificación del artículo 50 TUE","El referéndum fue en 2014 con el 55% a favor; la salida se produjo en 2018"],c:1,e:"El referéndum del Brexit se celebró el 23 de junio de 2016 (51,9% a favor de salir). El artículo 50 TUE se activó en marzo de 2017. La salida efectiva se produjo el 31 de enero de 2020."},
{u:1,t:"¿Qué es el 'principio de poderes conferidos' (principle of conferred powers) establecido en el Tratado de Lisboa?",o:["El principio por el que la UE puede extender sus competencias en cualquier momento si así lo decide el Consejo Europeo por unanimidad","El principio por el que la UE solo actúa dentro de los límites de las competencias que los Estados miembros le han atribuido en los tratados, permaneciendo todo lo demás en el ámbito estatal","El principio por el que los Estados miembros delegan definitivamente e irreversiblemente sus competencias en la UE","El principio que permite a la UE actuar en cualquier materia siempre que sea necesario para el mercado interior"],c:1,e:"El Tratado de Lisboa establece que la UE solo tiene los poderes que los Estados le han conferido expresamente. Los Estados pueden incluso recuperar competencias. Es la base del principio de atribución del art. 5 TUE."},
{u:1,t:"¿Cuáles son ejemplos de competencias EXCLUSIVAS de la UE según el Tratado de Lisboa?",o:["Educación, cultura y turismo","Unión aduanera, política comercial común, política monetaria del euro, conservación de recursos biológicos marinos","Agricultura, pesca, transporte y redes transeuropeas","Salud pública, industria y protección civil"],c:1,e:"Las competencias exclusivas de la UE (art. 3 TFUE) incluyen: unión aduanera, normas de competencia del mercado interior, política monetaria (eurozona), recursos biológicos del mar y política comercial común. Solo la UE puede legislar en estos ámbitos."},
{u:1,t:"¿Cuáles son ejemplos de competencias EXCLUSIVAS de los Estados miembros (de acción complementaria de la UE)?",o:["Unión aduanera, política comercial y política monetaria del euro","Protección y mejora de la salud humana, industria, cultura, turismo, educación, juventud, deporte y protección civil","Mercado interior, política social y cohesión territorial","Energía, transportes y redes transeuropeas"],c:1,e:"Las competencias de apoyo o acción complementaria de la UE (art. 6 TFUE) corresponden principalmente a los Estados: salud humana, industria, cultura, turismo, educación, juventud, deporte, formación profesional, protección civil y cooperación administrativa."},
{u:1,t:"¿Cuál es la diferencia entre el modelo 'supranacional' y el modelo 'intergubernamental' de integración?",o:["El modelo supranacional implica cooperación entre Estados sin ceder soberanía; el intergubernamental implica cesión definitiva de soberanía","El modelo supranacional implica cesión de soberanía a instituciones comunes con capacidad de dictar normas obligatorias; el intergubernamental es una coordinación de soberanías sin superposición de poderes","Son sinónimos en el contexto del Derecho de la UE","El modelo supranacional es solo económico; el intergubernamental es político y militar"],c:1,e:"Supranacionalidad: existe una organización con poder autónomo, independiente de los Estados, que dicta normas directamente obligatorias para Estados y ciudadanos. Intergubernamentalismo: coordinación de soberanías sin transferencia real de poder."},
{u:1,t:"¿Cuándo y cómo se creó el Consejo de Europa y cuál es su relación con la UE?",o:["Se creó el 25 de marzo de 1957 con los Tratados de Roma; es una institución de la UE","Se creó el 5 de mayo de 1949 en Londres; es una organización internacional independiente de la UE, con sede en Estrasburgo, centrada en la protección de los DDHH","Se creó en 1992 con el Tratado de Maastricht como institución de la UE para la protección de derechos fundamentales","Se creó en 1948 en el Congreso de La Haya como primer paso hacia la integración europea"],c:1,e:"El Consejo de Europa se fundó el 5 de mayo de 1949 en Londres (Estatuto). Con sede en Estrasburgo, es una organización internacional completamente independiente de la UE que agrupa a 46 Estados. Su gran legado es el CEDH (Roma, 4 noviembre 1950)."},
{u:1,t:"¿Cuáles son los 'padres fundadores' de Europa mencionados en el Congreso de La Haya de 1948?",o:["Churchill, Adenauer, De Gaulle y Monnet","Robert Schuman, Alcide de Gasperi, Paul Henri Spaak, Konrad Adenauer y Jean Monnet","Aristide Briand, Édouard Herriot, Léon Blum y Alcide de Gasperi","Walter Hallstein, Paul Henri Spaak, Jean Monnet y Charles de Gaulle"],c:1,e:"Los cinco padres fundadores reconocidos como tales son: Robert Schuman (Francia), Alcide de Gasperi (Italia), Paul Henri Spaak (Bélgica), Konrad Adenauer (Alemania) y Jean Monnet (Francia). Firmaron en La Haya (1948) un mensaje para los europeos."},
{u:1,t:"¿Cuándo entró en vigor el Tratado de Schengen y qué tres países se incorporaron a la UE ese mismo año (1995)?",o:["Entró en vigor en 1985; se incorporaron España, Portugal y Grecia","Entró en vigor en 1995; se incorporaron Austria, Suecia y Finlandia","Entró en vigor en 1992 con el Tratado de Maastricht; no coincidió con ninguna ampliación","Entró en vigor en 1999 con el Tratado de Ámsterdam; se incorporó solo Noruega"],c:1,e:"El Tratado de Schengen entró en vigor en 1995, el mismo año en que Austria, Suecia y Finlandia se adhirieron a la UE (cuarta ampliación, firmada en Corfú el 24 de junio de 1994)."},
{u:1,t:"¿Qué fue el Pacto Briand-Kellogg y cuál es su relevancia para la integración europea?",o:["El acuerdo que creó la OECE en 1948 para gestionar el Plan Marshall","El tratado de renuncia a la guerra (1928) impulsado por el ministro francés Aristide Briand, precursor del pensamiento europeísta de entreguerras que propuso una confederación europea","El acuerdo de cooperación militar entre Francia, Reino Unido y Bélgica firmado tras la Primera Guerra Mundial","El tratado bilateral franco-alemán que sentó las bases de la reconciliación y de la CECA"],c:1,e:"Aristide Briand impulsó el Pacto de Renuncia a la Guerra (Briand-Kellogg, 1928), por el que obtuvo el Nobel de la Paz. En 1929 sometió a la Sociedad de Naciones un proyecto de Unión Europea, siendo la primera proposición gubernamental formal de unión continental."},
{u:1,t:"¿Cuál fue la primera propuesta gubernamental de creación de una confederación europea y quién la presentó?",o:["La Declaración Schuman de 1950, presentada por Robert Schuman ante la Asamblea Nacional francesa","El proyecto de Unión Europea presentado por Aristide Briand ante la Asamblea de la Sociedad de Naciones el 7 de septiembre de 1929","El Plan Marshall de 1947, propuesto por el secretario de Estado estadounidense George Marshall","El discurso de Churchill de 1946 en Zúrich sobre los 'Estados Unidos de Europa'"],c:1,e:"La primera proposición gubernamental fue el proyecto de Unión Europea de Aristide Briand (ministro de AAEE francés), presentado a la Sociedad de Naciones el 7 de septiembre de 1929. La Declaración Schuman (1950) fue el primer paso concreto hacia la integración."},
{u:1,t:"¿Qué institución comunitaria describió Walter Hallstein con el término 'rechtsgemeinschaft' (comunidad de leyes)?",o:["El Tribunal de Justicia de las Comunidades Europeas","La Comisión Europea, de la que fue su primer presidente, inspirando su 'constitucionalización'","El Parlamento Europeo, del que fue primer presidente elegido por sufragio directo","El Consejo Europeo, al que dotó de su actual presidencia permanente"],c:1,e:"Walter Hallstein fue el primer presidente de la Comisión Europea. Acuñó el término 'rechtsgemeinschaft' (comunidad de leyes) para definir el proyecto de integración europeo e inspiró la 'constitucionalización' de la Comisión."},
{u:1,t:"¿Qué diferencia jurídica había entre el Tratado de la CECA y los Tratados de Roma (CEE y EURATOM)?",o:["Los tres eran tratados-ley con idéntica naturaleza jurídica y estructura institucional","El Tratado CECA era un tratado-ley con misión de gestión directa; los de Roma (CEE y EURATOM) eran tratados-marco que requerían desarrollo legislativo posterior por los Estados","El Tratado CECA era un tratado-marco; los de Roma, tratados-ley con aplicación directa","Solo el Tratado CEE era jurídicamente vinculante; el CECA y EURATOM eran declaraciones políticas"],c:1,e:"El Tratado CECA era un 'tratado-ley': sus instituciones gestionaban y ejecutaban directamente. Los Tratados de Roma (especialmente el CEE) eran 'tratados-marco' que fijaban objetivos y requerían desarrollo legislativo por los Estados."},
{u:1,t:"¿Qué reforma introdujo el Tratado de Ámsterdam (1999) en la estructura de pilares de Maastricht?",o:["Suprimió completamente los tres pilares, creando una estructura unitaria","Comunitarizó parte del tercer pilar (visados, asilo, inmigración), introdujo la cooperación reforzada/geometría variable y creó el cargo de Alto Representante para la PESC","Creó un cuarto pilar para la política de defensa y seguridad","Fusionó el segundo y tercer pilar en uno solo dedicado a asuntos exteriores"],c:1,e:"Ámsterdam comunitarizó en el TCE todo lo relativo a visados, asilo e inmigración (del antiguo tercer pilar), introdujo la cooperación reforzada y creó el Alto Representante del Consejo para la PESC (su primer titular fue Javier Solana)."},
// UD2 ─────────────────────────────────────────────────────────────────────
{u:2,t:"¿Cuántas instituciones oficiales tiene la UE según el Tratado de Lisboa?",o:["5","6","7","9"],c:2,e:"El TUE reconoce 7 instituciones: Parlamento Europeo, Consejo Europeo, Consejo, Comisión, TJUE, Banco Central Europeo y Tribunal de Cuentas."},
{u:2,t:"¿En qué consiste el criterio de 'proporcionalidad decreciente' en la composición del Parlamento Europeo?",o:["Más escaños a los países más ricos","Los países más poblados están infrarrepresentados per cápita, garantizando representación mínima a los menos poblados (mín. 6, máx. 96 escaños)","Todos los países tienen el mismo número de eurodiputados","Los países con mayor PIB tienen mayor representación"],c:1,e:"Cuanto mayor es el país, menor es el número de escaños en relación con su población total. Garantiza un mínimo de 6 y un máximo de 96 escaños por Estado. Así, los Estados pequeños están sobrerrepresentados per cápita."},
{u:2,t:"¿Cuál es la diferencia fundamental entre el Consejo Europeo y el Consejo de Europa?",o:["Son la misma institución con distinto nombre","El Consejo Europeo es institución de la UE (jefes de Estado/Gobierno); el Consejo de Europa es organización internacional ajena a la UE, 46 estados, centrada en DDHH","El Consejo de Europa es la institución legislativa de la UE","El Consejo Europeo se ocupa de asuntos económicos y el de Europa de asuntos políticos"],c:1,e:"Error clásico de examen: el Consejo de Europa (46 Estados, sede Estrasburgo, CEDH, TEDH) no tiene relación orgánica con la UE. El Consejo Europeo es institución de la UE desde el Tratado de Lisboa."},
{u:2,t:"¿Qué sistema de votación usa el Consejo para el 80% de la legislación de la UE?",o:["Unanimidad","Mayoría simple","Mayoría cualificada: 55% de los Estados que representen al menos el 65% de la población","Doble mayoría: 2/3 de Estados y 3/4 de la población"],c:2,e:"La mayoría cualificada (doble mayoría) exige el 55% de los Estados miembros que representen al menos el 65% de la población total. La minoría de bloqueo requiere al menos 4 Estados que representen más del 35%."},
{u:2,t:"¿Qué implica la 'responsabilidad colectiva' de la Comisión Europea?",o:["Que responde solidariamente de los daños económicos que cause","Que todos sus miembros actúan como un solo cuerpo: una moción de censura aprobada obliga a todos a dimitir conjuntamente","Que cada comisario responde individualmente ante su Estado","Que el Presidente puede cesar a un comisario sin que dimitan los demás"],c:1,e:"La responsabilidad colectiva implica que una moción de censura aprobada por el Parlamento (mayoría de 2/3 de votos emitidos que representen mayoría absoluta) obliga a la dimisión de todos los comisarios de forma conjunta."},
{u:2,t:"¿Cuál es la función del COREPER?",o:["Supervisar el presupuesto de la UE","Preparar los trabajos del Consejo y garantizar la coherencia de sus políticas","Representar a los ciudadanos ante la Comisión","Controlar la aplicación del DUE en los Estados"],c:1,e:"El COREPER (Comité de Representantes Permanentes) prepara los trabajos del Consejo de forma continua. Sus dos formaciones (COREPER I y II) elaboran acuerdos previos que luego adopta formalmente el Consejo."},
{u:2,t:"¿Cuáles son los dos órganos que integran el TJUE?",o:["Tribunal de Justicia y Tribunal de Cuentas","Tribunal de Justicia y Tribunal General","Tribunal General y Tribunal de Primera Instancia","Sala de Recursos y Tribunal Pleno"],c:1,e:"El sistema jurisdiccional europeo está integrado por el Tribunal de Justicia (TJ) y el Tribunal General (TG). Tras la reforma de Lisboa se suprimió el Tribunal de la Función Pública (absorbido por el TG en 2016)."},
{u:2,t:"¿Cuál es el objetivo del Consejo Europeo según el artículo 15.1 del TUE?",o:["Aprobar la legislación junto al Parlamento","Proporcionar los impulsos necesarios para el desarrollo de la UE y definir sus orientaciones y prioridades políticas generales","Gestionar la política monetaria de la eurozona","Controlar el presupuesto de la Unión"],c:1,e:"El Consejo Europeo no ejerce funciones legislativas ni ejecutivas. Su misión es exclusivamente la dirección estratégica: definir orientaciones y prioridades políticas generales para el desarrollo de la UE."},
{u:2,t:"¿Qué figura ocupa simultáneamente la presidencia del Consejo de Asuntos Exteriores y una vicepresidencia de la Comisión?",o:["El Presidente del Consejo Europeo","El Presidente de la Comisión","El Alto Representante de la Unión para Asuntos Exteriores y Política de Seguridad","El Secretario General del Consejo"],c:2,e:"El Alto Representante ('doble sombrero') dirige la PESC, preside el Consejo de Asuntos Exteriores y ocupa simultáneamente una vicepresidencia de la Comisión. Desde diciembre de 2024 es Kaja Kallas."},
{u:2,t:"¿Cuándo se convirtió el Consejo Europeo en institución formal de la UE?",o:["Con el Tratado de Roma (1957)","Con el Tratado de Maastricht (1992)","Con el Tratado de Lisboa (en vigor diciembre 2009)","Con el Tratado de Niza (2001)"],c:2,e:"El Consejo Europeo existía como foro informal desde la Cumbre de París de 1974. El Tratado de Lisboa le otorgó rango de institución y creó la figura de un Presidente permanente (mandato de 2,5 años, renovable una vez)."},
{u:2,t:"¿Cuál es la diferencia entre el Consejo de la UE y el Consejo Europeo?",o:["Son la misma institución con distintas funciones según el orden del día","El Consejo (de la UE) reúne a ministros nacionales y ejerce funciones legislativas; el Consejo Europeo reúne a jefes de Estado/Gobierno para la dirección estratégica","El Consejo Europeo aprueba el presupuesto; el Consejo dirige la política exterior","El Consejo se reúne en Bruselas; el Consejo Europeo en Estrasburgo"],c:1,e:"El Consejo (antes Consejo de Ministros) reúne a los ministros nacionales según la materia y es colegislador junto al Parlamento. El Consejo Europeo reúne a los jefes de Estado o de Gobierno y fija las orientaciones estratégicas."},
{u:2,t:"¿Qué institución tiene el monopolio de la iniciativa legislativa en la UE?",o:["El Parlamento Europeo","El Consejo Europeo","La Comisión Europea","El Tribunal de Justicia de la UE"],c:2,e:"La Comisión Europea tiene el monopolio de la iniciativa legislativa: es el único órgano que puede presentar propuestas de actos legislativos. El Parlamento y el Consejo pueden solicitar a la Comisión que presente propuestas, pero no proponer directamente."},
{u:2,t:"¿Cuál es el procedimiento legislativo ordinario en la UE desde el Tratado de Lisboa?",o:["El procedimiento de consulta, en el que el Consejo decide y el Parlamento da su opinión","El procedimiento de codecisión entre Parlamento y Consejo, rebautizado 'procedimiento legislativo ordinario' por el Tratado de Lisboa","El procedimiento de dictamen conforme","El procedimiento de cooperación reforzada"],c:1,e:"El Tratado de Lisboa rebautizó el procedimiento de codecisión como 'procedimiento legislativo ordinario' (art. 294 TFUE). Coloca a Parlamento y Consejo en pie de igualdad como colegisladores. Se aplica a la mayoría de los ámbitos de la UE."},
{u:2,t:"¿Cada cuántos años se celebran las elecciones al Parlamento Europeo?",o:["3 años","4 años","5 años","6 años"],c:2,e:"Los ciudadanos de la UE eligen a sus eurodiputados cada 5 años mediante sufragio universal directo. Las últimas elecciones se celebraron en junio de 2024 con participación récord de los últimos 30 años."},
{u:2,t:"¿Para qué materias sigue siendo necesaria la unanimidad en el Consejo?",o:["Para toda legislación del mercado interior","Para temas sensibles: ciudadanía, adhesión de nuevos miembros, revisión de tratados, fiscalidad y PESC","Para cualquier legislación que afecte a derechos fundamentales","Para la aprobación del presupuesto anual"],c:1,e:"La unanimidad se reserva a materias especialmente sensibles que los Estados no quisieron someter a mayoría: ciudadanía, adhesión de nuevos miembros, revisión de tratados, medidas fiscales, PESC y algunas materias de política social."},
{u:2,t:"¿Qué es la 'minoría de bloqueo' en el sistema de mayoría cualificada del Consejo?",o:["El número mínimo de Estados para aprobar una propuesta","Al menos 4 Estados que representen más del 35% de la población, impidiendo alcanzar la mayoría cualificada","La posibilidad de que un solo Estado bloquee cualquier decisión del Consejo","Los Estados necesarios para convocar una sesión extraordinaria"],c:1,e:"Para bloquear una mayoría cualificada se necesitan al menos 4 Estados que representen más del 35% de la población de la UE. Esto impide que los tres grandes (Alemania, Francia, Italia) bloqueen solos sin apoyo de al menos un cuarto Estado."},
{u:2,t:"¿Cuántos abogados generales tiene actualmente el Tribunal de Justicia?",o:["6","9","11","15"],c:2,e:"El TJUE cuenta actualmente con 11 Abogados Generales. Presentan conclusiones motivadas e imparciales sobre los asuntos que requieren su intervención, asistiendo al Tribunal en su labor jurisdiccional."},
{u:2,t:"¿Qué es el Compromiso de Ioannina y qué permitía?",o:["El acuerdo que creó el procedimiento de codecisión en Maastricht","Un acuerdo que permitía que un grupo de Estados cercano a la minoría de bloqueo (pero sin alcanzarla) solicitara la revisión de una decisión ya adoptada por mayoría cualificada","El acuerdo que fijó la sede del Parlamento Europeo en Estrasburgo","El compromiso por el que el Reino Unido obtuvo su 'cheque' o rebaja presupuestaria"],c:1,e:"El Compromiso de Ioannina surgió en una reunión informal de ministros de AAEE de la UE en Ioannina (Grecia). Permitía que un grupo próximo a la minoría de bloqueo, aunque sin lograrla, pudiera pedir la revisión de una decisión adoptada por mayoría cualificada del Consejo."},
{u:2,t:"¿Cuál es la duración del mandato del Presidente del Consejo Europeo según el Tratado de Lisboa?",o:["2 años, no renovables","2,5 años, renovable una sola vez (máximo 5 años)","5 años, coincidiendo con el mandato del Parlamento Europeo","4 años, renovable indefinidamente"],c:1,e:"El Tratado de Lisboa estableció una presidencia estable del Consejo Europeo de dos años y medio (2,5 años), renovable una sola vez, lo que permite hasta 5 años en el cargo."},
// UD3 ─────────────────────────────────────────────────────────────────────
{u:3,t:"¿Cuál es la diferencia entre Derecho originario y Derecho derivado de la UE?",o:["El originario lo aprueba el Parlamento; el derivado, la Comisión","El originario son los tratados y sus protocolos; el derivado (acquis communautaire) emana de las instituciones en ejercicio de sus competencias","El originario es vinculante; el derivado, no","El originario solo afecta a Estados; el derivado solo a ciudadanos"],c:1,e:"El Derecho originario son las normas supremas (tratados, protocolos, anexos y declaraciones). El Derecho derivado surge de la acción de las instituciones en ejercicio de sus competencias y no requiere, en principio, actos posteriores de los Estados para desplegar efectos."},
{u:3,t:"¿Qué característica distingue principalmente al Reglamento de la Directiva?",o:["El Reglamento es más difícil de modificar","El Reglamento es obligatorio en todos sus elementos y de aplicación directa, sin necesidad de transposición nacional","La Directiva siempre tiene efecto directo; el Reglamento no","El Reglamento solo obliga a los Estados; la Directiva obliga a los ciudadanos"],c:1,e:"El Reglamento tiene alcance general, es obligatorio en todos sus elementos y de aplicación directa. No requiere que las autoridades nacionales intervengan para que surta efectos jurídicos en los Estados miembros."},
{u:3,t:"¿Qué tres condiciones exige el TJUE para que una Directiva no transpuesta tenga efecto directo?",o:["Urgencia, afectación a DDHH e incumplimiento reiterado","Transposición inexistente o incorrecta + términos incondicionales, claros y precisos + atribución de derechos a particulares","Aprobación por unanimidad, voto favorable del PE y publicación en el DOUE","Inicio del procedimiento de infracción, plazo vencido y autorización del TJUE"],c:1,e:"La jurisprudencia TJUE (Van Duyn, Ratti, Marshall) exige estas tres condiciones acumulativas para el efecto directo de directivas no transpuestas o incorrectamente transpuestas por los Estados."},
{u:3,t:"¿Cuál es la distinción entre 'armonización mínima' y 'armonización máxima'?",o:["La mínima es para directivas económicas; la máxima, para sociales","La mínima fija estándares básicos permitiendo normas nacionales más estrictas; la máxima fija un estándar exacto sin margen de variación","La mínima solo afecta a los países fundadores","La máxima solo se aplica cuando hay unanimidad en el Consejo"],c:1,e:"Armonización mínima: el Estado puede ir más allá de los mínimos europeos. Armonización máxima: el Estado no puede apartarse del estándar fijado en la directiva, ni por encima ni por debajo. Crea un techo y un suelo idénticos."},
{u:3,t:"¿Qué procedimiento previo a la infracción estableció la Comisión para evitar llegar al TJUE?",o:["El procedimiento de cooperación reforzada","El mecanismo 'EU Pilot': diálogo constructivo previo para resolver problemas de aplicación antes del recurso formal","El mecanismo de revisión preliminar del Tribunal General","El mecanismo de mediación del Consejo de Europa"],c:1,e:"El 'EU Pilot' es un mecanismo preventivo de diálogo entre la Comisión y el Estado para aclarar situaciones y resolver problemas administrativos antes de iniciar un procedimiento formal de infracción."},
{u:3,t:"¿Cuál es la diferencia entre una 'suma a tanto alzado' y una 'multa' como sanciones del TJUE a Estados?",o:["Son idénticas, solo difieren en denominación","La suma a tanto alzado es disuasoria (evitar repetición); la multa periódica es coercitiva (obligar a cesar la infracción activa)","La suma a tanto alzado la impone el Consejo; la multa, el TJUE","La multa es para infracciones leves; la suma a tanto alzado, para graves"],c:1,e:"Suma a tanto alzado = finalidad disuasoria para que no se repita el incumplimiento. Multa periódica = función coercitiva para obligar al Estado a cesar la infracción en curso. Ambas pueden imponerse simultáneamente."},
{u:3,t:"¿Qué es el acquis communautaire?",o:["El conjunto de tratados fundacionales de la UE","El conjunto del Derecho derivado surgido de la acción de las instituciones en ejercicio de sus competencias","El manual de procedimiento del Consejo Europeo","El catálogo de derechos de la Carta de DDFF"],c:1,e:"El acquis communautaire ('acervo comunitario') es todo el Derecho derivado: reglamentos, directivas, decisiones y demás actos normativos adoptados por las instituciones de la UE en ejercicio de sus competencias."},
{u:3,t:"¿Cuál es el plazo habitual para que los Estados transpongan una Directiva?",o:["6 meses","1 año","2 años","5 años"],c:2,e:"Las directivas establecen un objetivo que los Estados deben incorporar a su ordenamiento interno mediante transposición, generalmente en un plazo de dos años desde su publicación en el Diario Oficial de la UE."},
{u:3,t:"¿Qué tipo de acto es una 'Decisión' de la UE?",o:["Un acto no vinculante como las Recomendaciones","Un acto obligatorio en todos sus elementos; si designa destinatarios concretos, solo es obligatoria para estos","Un acto vinculante solo para instituciones de la UE","Un tipo de reglamento aplicable solo a sectores económicos específicos"],c:1,e:"La Decisión es un acto derivado obligatorio. A diferencia del Reglamento, puede tener destinatarios concretos (Estados, empresas, ciudadanos) y entonces solo obliga a estos. Si no tiene destinatarios específicos, obliga a todos."},
{u:3,t:"¿Qué son las 'Recomendaciones' en el Derecho de la UE?",o:["Actos obligatorios para los Estados en cuanto al resultado pero con libertad de forma","Instrumentos no vinculantes que sugieren un comportamiento para lograr la armonización sin imponer obligaciones jurídicas formales","Directivas simplificadas con plazo reducido de transposición","Actos del Consejo Europeo con carácter de orientación política vinculante"],c:1,e:"La Recomendación es un instrumento de acción indirecta no vinculante. Sugiere un comportamiento sin imponer obligaciones jurídicas. Aunque no sean vinculantes, los tribunales nacionales deben tenerlas en cuenta al interpretar el DUE."},
{u:3,t:"¿Cuáles son las fases del procedimiento formal de infracción (art. 258 TFUE)?",o:["Dictamen motivado → carta de emplazamiento → recurso al TJUE","1) Carta de emplazamiento (2 meses para observaciones); 2) dictamen motivado; 3) recurso ante el TJUE si persiste el incumplimiento","Recurso ante el TG → recurso ante el TJ → sanción del Consejo","Notificación de la Comisión → respuesta del Estado → sanción automática"],c:1,e:"El procedimiento formal de infracción sigue tres fases: 1) carta de emplazamiento (Estado tiene 2 meses para responder); 2) dictamen motivado de la Comisión; 3) recurso ante el TJUE si el Estado no corrige su incumplimiento."},
{u:3,t:"¿Qué son los 'actos sui generis' en el Derecho de la UE?",o:["Actos legislativos del Consejo Europeo no previstos en los tratados","Actos no legislativos que pueden ser obligatorios (Reglamentos de Régimen Interno) o no obligatorios (resoluciones, declaraciones, conclusiones)","Un tipo especial de directiva con aplicación directa","Los actos de la Comisión en materia de competencia"],c:1,e:"Los actos sui generis son una categoría atípica: pueden ser obligatorios (p.ej. Reglamentos de Régimen Interno de instituciones) o no obligatorios (resoluciones, declaraciones, conclusiones del Consejo Europeo)."},
{u:3,t:"¿En qué se diferencia un Reglamento delegado de un Reglamento de ejecución?",o:["No hay diferencia: ambos son aprobados por la Comisión con idéntico procedimiento","El delegado (art. 290 TFUE) modifica o complementa elementos no esenciales de actos legislativos; el de ejecución (art. 291 TFUE) fija condiciones uniformes de aplicación de actos vinculantes","El delegado lo aprueba el Consejo; el de ejecución, el Parlamento","El delegado tiene rango de Derecho originario; el de ejecución, de Derecho derivado"],c:1,e:"Art. 290 TFUE: delegación en la Comisión para modificar/complementar elementos no esenciales de actos legislativos (control parlamentario posterior). Art. 291 TFUE: actos de ejecución para condiciones uniformes de aplicación (control de los Estados mediante comités)."},
{u:3,t:"¿Cómo afecta la integración europea a la distribución competencial entre Estado y CCAA en España?",o:["No afecta: la UE respeta plenamente la autonomía regional","Ha producido un desplazamiento de facto a favor del Estado, que asume la transposición incluso en materias autonómicas, vaciando en la práctica competencias de las CCAA","Ha reforzado las competencias de las CCAA frente al Estado central","Ha obligado al Estado a delegar en las CCAA toda la transposición de directivas"],c:1,e:"Aunque el TC rechaza que la responsabilidad internacional justifique asumir competencias ajenas, en la práctica el detalle de las normas estatales de transposición ha vaciado de contenido competencias autonómicas. Es el llamado 'efecto de desplazamiento competencial'."},
{u:3,t:"¿Qué se entiende por 'derecho supletorio' en el sistema de fuentes de la UE?",o:["El DUE que se aplica cuando contradice a los tratados","La fuente complementaria compuesta por el derecho internacional público/privado y los principios generales del derecho interno de los Estados, aplicable en supuestos no regulados por el DUE","Las directivas no transpuestas a tiempo por los Estados","Los reglamentos delegados adoptados por la Comisión"],c:1,e:"El derecho supletorio es la fuente complementaria del DUE: derecho internacional (público y privado) y, en determinados supuestos, principios generales del derecho interno de los Estados miembros. Se aplica solo cuando el DUE no regula la materia."},
// UD4 ─────────────────────────────────────────────────────────────────────
{u:4,t:"¿En qué sentencia del TJUE se originó el principio de primacía del DUE?",o:["Van Gend en Loos (1963)","Costa/ENEL (1964)","Simmenthal (1978)","Taricco (2015)"],c:1,e:"En Costa/ENEL (1964) el TJUE estableció que la adhesión a la UE implica una limitación definitiva de la soberanía nacional: una norma interna posterior no puede prevalecer sobre el DUE, aunque sea de rango constitucional."},
{u:4,t:"¿Qué obligación concreta estableció la sentencia Simmenthal (1978)?",o:["Consultar siempre al TJUE antes de inaplicar una norma nacional","Solicitar al Parlamento la derogación de la norma incompatible","Inaplicar de oficio cualquier disposición nacional contraria al DUE, anterior o posterior, sin esperar su derogación","Aplicar la norma nacional hasta que el TC nacional la declare inconstitucional"],c:2,e:"Simmenthal obliga al juez nacional a garantizar la plena eficacia del DUE dejando inaplicada cualquier norma contraria, sin esperar su derogación legislativa o constitucional. El juez nacional actúa por propia iniciativa."},
{u:4,t:"Según el asunto Poplawski II (2019), ¿cuándo puede el juez nacional inaplicar derecho interno?",o:["Siempre que exista contradicción con el DUE, con efecto directo o sin él","Solo cuando la Comisión haya iniciado un procedimiento de infracción","Solo cuando la disposición del DUE tenga efecto directo (sea clara, precisa e incondicional)","Solo cuando el TJUE lo autorice mediante cuestión prejudicial"],c:2,e:"Poplawski II limita la inaplicación: solo procede cuando la norma del DUE posee efecto directo. Sin él, el juez debe intentar interpretación conforme pero no puede inaplicar la ley nacional basándose solo en el principio de primacía."},
{u:4,t:"¿Cuál es el límite establecido por la sentencia Taricco II a la primacía del DUE?",o:["Los derechos sociales nacionales prevalecen siempre sobre el DUE","Si aplicar la primacía en materia penal vulnera el principio de legalidad constitucional nacional, el juez no está obligado a inaplicar la norma interna","El DUE no puede aplicarse en materia fiscal nacional","La primacía cede ante cualquier norma constitucional nacional"],c:1,e:"Taricco II reconoce un límite externo: si aplicar la primacía en materia penal genera incertidumbre jurídica incompatible con el principio de legalidad (constitucional), el juez nacional no está obligado a inaplicar su norma."},
{u:4,t:"¿Cómo limita el respeto a los derechos fundamentales la operatividad de la primacía (Deutsche Umwelthilfe)?",o:["No la limita: la primacía es absoluta","La primacía no autoriza al juez a adoptar medidas que vulneren derechos de la Carta (como privar de libertad sin base legal interna precisa)","Solo los derechos del CEDH limitan la primacía; no los de la Carta de la UE","La primacía solo cede ante derechos de primera generación"],c:1,e:"En Deutsche Umwelthilfe el TJUE determinó que la primacía no puede usarse para justificar la privación de libertad si la ley nacional no prevé base legal precisa, clara y previsible para esa medida coercitiva."},
{u:4,t:"¿Cuáles son las dos dimensiones del principio de solidaridad en el DUE?",o:["Horizontal (entre instituciones) y vertical (entre UE y ciudadanos)","Interestatal (entre Estados y entre estos y la UE) y social (entre individuos, vinculada al art. 2 TUE)","Económica (fondos de cohesión) y política (PESC)","Interna (dentro del TJUE) y externa (entre UE y terceros países)"],c:1,e:"La solidaridad interestatal es un principio federativo que rige relaciones entre Estados (p.ej. asilo, energía). La solidaridad social implica a los individuos y sus relaciones con la UE, vinculada a los valores del art. 2 TUE."},
{u:4,t:"¿Qué es la 'identidad constitucional' de los Estados miembros (art. 4.2 TUE)?",o:["La versión traducida de los tratados en cada lengua oficial","El núcleo duro de principios y estructuras fundamentales de cada Estado que la UE está obligada a respetar","Los valores democráticos que deben adoptar los candidatos a la adhesión","El conjunto de normas constitucionales que regulan la relación del Estado con la UE"],c:1,e:"La identidad constitucional (art. 4.2 TUE) protege el núcleo esencial de los sistemas constitucionales nacionales frente a la primacía del DUE. Es un límite externo reconocido expresamente en los tratados."},
{u:4,t:"¿Por qué una actividad basada en solidaridad no es 'económica' en derecho de competencia (Poucet y Pistre)?",o:["Porque está expresamente excluida por el TFUE","Porque los organismos de solidaridad no tienen lucro ni operan bajo criterios de mercado, y no son 'empresas' a efectos de los arts. 101-102 TFUE","Porque la UE siempre subvenciona esas actividades","Porque son actividades desarrolladas por los Estados"],c:1,e:"Poucet y Pistre: los regímenes de seguridad social basados en solidaridad nacional (prestaciones independientes de los recursos, sin lucro) no son actividades económicas. No están sujetos a los arts. 101-102 TFUE."},
{u:4,t:"¿Qué relación tiene el principio de cosa juzgada con la primacía del DUE?",o:["La cosa juzgada no limita nunca la primacía","La primacía obliga a revisar todas las sentencias firmes contrarias al DUE","El DUE no obliga generalmente a reconsiderar sentencias firmes, salvo excepciones (como Lucchini en ayudas de Estado ilegales)","La cosa juzgada solo existe en el DUE, no en los ordenamientos nacionales"],c:2,e:"La seguridad jurídica protege generalmente las sentencias firmes frente a la primacía. La excepción más conocida es Lucchini (2007): el TJUE impuso la recuperación de ayudas de Estado ilegales pese a sentencia firme."},
{u:4,t:"¿Qué efecto jurídico reconoció el TJUE al principio de solidaridad energética (Alemania/Polonia)?",o:["Ninguno: es un principio político sin efectos jurídicos","Es un principio fundamental vinculante que puede servir como criterio de legalidad de los actos institucionales (art. 194 TFUE)","Solo obliga a los Estados exportadores de energía","Solo se aplica en situaciones de guerra o crisis energética grave"],c:1,e:"El TJUE confirmó que la solidaridad energética (art. 194 TFUE) produce efectos jurídicos vinculantes y puede utilizarse como parámetro de legalidad de las decisiones de las instituciones de la UE."},
{u:4,t:"¿Cuáles son los tres principios que rigen la atribución de competencias entre la UE y los Estados (art. 5 TUE)?",o:["Primacía, efecto directo y efecto útil","Atribución (solo actúa dentro de los límites fijados por los tratados), subsidiariedad y proporcionalidad","Cooperación leal, solidaridad y no discriminación","Transparencia, democracia participativa y estado de derecho"],c:1,e:"El art. 5 TUE: atribución (la UE actúa solo dentro de los poderes conferidos), subsidiariedad (actúa si los objetivos no pueden alcanzarse suficientemente por los Estados) y proporcionalidad (el contenido y forma no excede lo necesario para los objetivos de los tratados)."},
{u:4,t:"¿Cuáles son los tres tipos de competencias de la UE (arts. 3, 4 y 6 TFUE)?",o:["Primarias, secundarias y terciarias","Exclusivas (solo legisla la UE), compartidas (pueden legislar la UE y los Estados) y de apoyo/coordinación/complemento (los Estados mantienen la competencia principal)","Obligatorias, facultativas y discrecionales","Reglamentarias, directivas y de ejecución"],c:1,e:"El TFUE distingue: exclusivas (solo la UE puede legislar; p.ej. unión aduanera, política comercial), compartidas (pueden legislar UE y Estados; p.ej. mercado interior, medio ambiente) y de apoyo, coordinación o complemento (los Estados mantienen la competencia; p.ej. educación, cultura, turismo)."},
{u:4,t:"¿Qué es la 'interpretación conforme' y cuándo la aplica el juez nacional?",o:["El juez inaplicar el DUE cuando es incompatible con la Constitución nacional","El deber del juez de interpretar el derecho interno de forma compatible con el DUE; alternativa a la inaplicación cuando la norma del DUE carece de efecto directo","La obligación del TJUE de interpretar los tratados favorablemente a los Estados miembros","El principio por el que la Comisión interpreta las directivas de forma uniforme en todos los Estados"],c:1,e:"Interpretación conforme: el juez nacional debe interpretar el derecho interno de forma compatible con el DUE. Es la alternativa cuando la norma del DUE carece de efecto directo: no puede inaplicar la ley nacional pero sí interpretarla 'en sentido conforme'."},
{u:4,t:"¿Qué establece el principio de 'cooperación leal' (art. 4.3 TUE)?",o:["Que la Comisión debe cooperar con los Estados en materia de sanciones económicas","La obligación recíproca de Estados y Unión de respetarse y asistirse mutuamente en el cumplimiento de las misiones derivadas de los tratados","Que los Estados deben cooperar en la aplicación de la PESC","La obligación del Parlamento de cooperar con el Consejo en el procedimiento legislativo"],c:1,e:"La cooperación leal (art. 4.3 TUE) impone a los Estados: adoptar medidas adecuadas para cumplir el DUE, abstenerse de medidas que pongan en peligro los objetivos de la UE, y facilitarse mutuamente el cumplimiento de sus misiones."},
{u:4,t:"¿Qué significa el principio del 'efecto útil' (effet utile) del DUE?",o:["Solo son válidas las normas de la UE que han producido efectos económicos concretos","El principio interpretativo por el que las normas del DUE deben interpretarse de modo que surtan todos los efectos prácticos posibles, evitando interpretaciones que las vacíen de contenido","El principio por el que los reglamentos son más útiles que las directivas","La obligación de los Estados de publicar las normas de transposición en su boletín oficial"],c:1,e:"El effet utile es un principio interpretativo del TJUE: las disposiciones del DUE deben interpretarse de manera que desplieguen el máximo efecto práctico posible. Se usa para ampliar el alcance de los derechos reconocidos por el DUE."},
{u:4,t:"¿Cómo fundamenta el TJUE la primacía en el principio de igualdad entre los Estados miembros?",o:["No existe ese fundamento: la primacía se basa exclusivamente en la soberanía de la UE","La primacía garantiza la aplicación uniforme del DUE en toda la Unión: si un Estado pudiera hacer prevalecer sus normas internas, generaría discriminación por razón de la nacionalidad y quebraría la igualdad entre Estados","La primacía se basa en que la UE tiene más poder económico que los Estados","La igualdad entre Estados no es relevante para el principio de primacía"],c:1,e:"El TJUE fundamenta la primacía también en la igualdad: todos los Estados son iguales ante los tratados. Si uno pudiera hacer prevalecer sus normas internas, se generaría discriminación por razón de la nacionalidad y se rompería la aplicación uniforme del DUE."},
// UD5 ─────────────────────────────────────────────────────────────────────
{u:5,t:"¿Quién es ciudadano de la Unión Europea según el art. 20 TFUE?",o:["Todo residente legal en un Estado miembro durante más de 5 años","Toda persona que ostente la nacionalidad de un Estado miembro, automáticamente, sin sustituir la nacional","Solo los nacionales de los Estados fundadores","Toda persona nacida en territorio de la UE"],c:1,e:"La ciudadanía de la Unión se atribuye automáticamente a los nacionales de los Estados miembros. Es un estatuto complementario que añade derechos propios del ámbito de la UE sin sustituir la nacionalidad nacional."},
{u:5,t:"¿Qué Tratado introdujo formalmente la ciudadanía europea?",o:["Tratado de Ámsterdam (1997)","Tratado de Maastricht (1992)","Tratado de Lisboa (2009)","Acta Única Europea (1986)"],c:1,e:"El Tratado de Maastricht (1992) introdujo formalmente la ciudadanía de la Unión, reconociendo derechos como el sufragio municipal para ciudadanos residentes en otro Estado miembro."},
{u:5,t:"¿Cuándo adquirió carácter jurídicamente vinculante la Carta de los Derechos Fundamentales de la UE?",o:["Cuando fue proclamada en Niza en el año 2000","Con la entrada en vigor del Tratado de Lisboa en diciembre de 2009","Con el Tratado de Ámsterdam en 1997","Con la adhesión del Estado miembro número 25 en 2004"],c:1,e:"La Carta fue proclamada en el año 2000 en Niza, pero solo adquirió carácter jurídicamente vinculante con el Tratado de Lisboa (diciembre 2009), para instituciones y Estados miembros al aplicar DUE."},
{u:5,t:"¿En cuántos capítulos se estructura la Carta de los Derechos Fundamentales?",o:["5","6","7: Dignidad, Libertad, Igualdad, Solidaridad, Ciudadanía, Justicia y Disposiciones generales","10"],c:2,e:"La Carta se organiza en 7 capítulos temáticos que abarcan derechos civiles, políticos, económicos y sociales en un único instrumento vinculante."},
{u:5,t:"¿En qué consiste el derecho de sufragio activo y pasivo del ciudadano europeo no nacional?",o:["Solo puede votar en las elecciones del Estado de su nacionalidad","Puede votar y ser candidato en elecciones municipales y al Parlamento Europeo en su Estado de residencia en las mismas condiciones que los nacionales","Puede votar en todas las elecciones del Estado de residencia, incluidas las nacionales","Solo puede votar, pero no ser candidato, en el Estado de residencia"],c:1,e:"El ciudadano europeo residente en otro Estado tiene derecho de sufragio activo (votar) y pasivo (ser candidato) en elecciones municipales y europeas en las mismas condiciones que los nacionales de ese Estado."},
{u:5,t:"¿Qué protección tiene un ciudadano europeo en un tercer país donde su Estado no tiene representación?",o:["Ninguna: depende de la embajada de un Estado extracomunitario","Puede acogerse a la protección diplomática y consular de cualquier otro Estado miembro en las mismas condiciones que sus propios nacionales","Puede acudir al Defensor del Pueblo Europeo desde el exterior","Solo puede solicitar ayuda al consulado de su Estado de residencia habitual"],c:1,e:"La protección consular compartida es un derecho de ciudadanía: cualquier Estado miembro debe asistir al ciudadano de la UE en un país tercero donde su propio Estado no tenga representación."},
{u:5,t:"¿Qué es la Iniciativa Ciudadana Europea y cuántas firmas requiere?",o:["Una petición al Parlamento Europeo que requiere 10.000 ciudadanos","Un mecanismo de democracia participativa que permite a un millón de ciudadanos de varios Estados invitar a la Comisión a proponer legislación","Un referéndum europeo que requiere mayoría de ciudadanos de todos los Estados","Una consulta pública que requiere 500.000 firmas de un solo Estado"],c:1,e:"La ICE permite a un millón de ciudadanos de un número significativo de Estados (al menos 7) invitar a la Comisión —no al Parlamento— a presentar propuestas legislativas en áreas de su competencia."},
{u:5,t:"¿Qué es el Defensor del Pueblo Europeo?",o:["El presidente del Tribunal Europeo de Derechos Humanos","Una institución independiente que investiga casos de mala administración en las instituciones y órganos de la UE, sin potestad para anular decisiones","Un representante del PE con poderes ejecutivos","Un órgano consultivo del Consejo de Europa"],c:1,e:"El Defensor del Pueblo (Ombudsman europeo) recibe reclamaciones sobre mala administración (negligencia, retrasos, discriminación) y busca soluciones amistosas. Carece de poderes para anular decisiones por sí mismo."},
{u:5,t:"¿Cuál es la relación entre la UE y el Convenio Europeo de Derechos Humanos (CEDH)?",o:["La UE ya es parte del CEDH desde Maastricht","El Tratado de Lisboa obliga a la UE a adherirse al CEDH, pero esta adhesión aún no se ha producido tras el Dictamen 2/13 del TJUE (2014)","El CEDH y la Carta de la UE son el mismo instrumento con distinto nombre","La UE no tiene relación jurídica alguna con el CEDH"],c:1,e:"El Tratado de Lisboa (art. 6.2 TUE) obliga a la UE a adherirse al CEDH. Sin embargo, en el Dictamen 2/13 (2014) el TJUE declaró incompatible el proyecto de adhesión con el DUE, por lo que esta adhesión aún no se ha materializado."},
{u:5,t:"¿Qué requisitos mínimos debe cumplir una petición ante el Parlamento Europeo?",o:["Solo el nombre y Estado de residencia","Nombre, profesión, nacionalidad y domicilio; en cualquier lengua oficial sobre asuntos que afecten directamente al peticionario","Al menos 1.000 firmas de ciudadanos de distintos Estados","Un informe jurídico que avale su admisibilidad"],c:1,e:"Cualquier ciudadano o residente legal puede presentar una petición (individual o colectiva) en cualquier lengua oficial de la UE sobre asuntos del ámbito europeo que le afecten, indicando solo nombre, profesión, nacionalidad y domicilio."},
{u:5,t:"¿Qué es el principio de no discriminación por razón de nacionalidad (art. 18 TFUE)?",o:["La prohibición de que los Estados discriminen a sus propios nacionales en beneficio de otros ciudadanos de la UE","La regla que prohíbe cualquier distinción por razón de la nacionalidad dentro del ámbito de aplicación de los tratados","Un principio aplicable solo en el mercado laboral","Una disposición que solo se aplica a los nacionales de los Estados fundadores"],c:1,e:"El art. 18 TFUE prohíbe toda discriminación por razón de la nacionalidad en el ámbito de aplicación de los tratados. El TJUE lo ha aplicado al acceso al empleo, servicios sociales, becas de estudio y otras prestaciones."},
{u:5,t:"¿Qué es el derecho a la buena administración reconocido en la Carta (art. 41)?",o:["El derecho de los ciudadanos a que la UE les informe de todas sus decisiones internas","El derecho de toda persona a que sus asuntos sean tratados imparcialmente, equitativamente y en plazo razonable por las instituciones de la UE, con derecho a ser oído y acceso al expediente","Un derecho solo aplicable a funcionarios europeos","El derecho de las empresas a impugnar cualquier decisión de la Comisión"],c:1,e:"El art. 41 Carta reconoce el derecho a la buena administración: trato imparcial y equitativo en plazo razonable, derecho a ser oído, acceso al expediente, obligación de motivar decisiones y derecho a reparación. Solo es directamente aplicable frente a instituciones y órganos de la UE."},
{u:5,t:"¿Cuáles son las cuatro libertades fundamentales del mercado interior europeo?",o:["Libertad de pensamiento, expresión, religión y asociación","Libre circulación de mercancías, personas, servicios y capitales","Libre circulación de trabajadores, libre establecimiento y libre prestación de servicios","Libre circulación de mercancías, libre competencia y libre prestación de servicios financieros"],c:1,e:"Las cuatro libertades fundamentales del mercado interior (art. 26 TFUE) son: libre circulación de mercancías, de personas (trabajadores y ciudadanos), de servicios y de capitales. Sobre ellas se construye el mercado único europeo."},
{u:5,t:"¿Qué estableció el Tratado de Ámsterdam en materia de derechos de ciudadanía?",o:["Creó la ciudadanía europea por primera vez","Generalizó el derecho de los ciudadanos a dirigirse a todas las instituciones de la Unión y recibir respuesta en la misma lengua oficial","Introdujo el voto en elecciones europeas para todos los residentes legales","Suprimió la figura del Defensor del Pueblo Europeo"],c:1,e:"El Tratado de Ámsterdam amplió y consolidó los derechos de ciudadanía, generalizando el derecho de los ciudadanos a dirigirse a todas las instituciones de la UE en cualquier lengua oficial y recibir respuesta en esa misma lengua."},
// UD6 ─────────────────────────────────────────────────────────────────────
{u:6,t:"¿Qué mecanismo permite a un juez nacional consultar al TJUE sobre la interpretación del DUE?",o:["El recurso de anulación","La cuestión prejudicial (art. 267 TFUE)","El recurso por omisión","El procedimiento de infracción (art. 258 TFUE)"],c:1,e:"La cuestión prejudicial es el mecanismo por el que un juez nacional interrumpe el proceso y consulta al TJUE para garantizar la interpretación uniforme del DUE en toda la Unión. Es el mecanismo de diálogo judicial entre jueces nacionales y el TJUE."},
{u:6,t:"¿Quiénes son los 'demandantes privilegiados' en el recurso de anulación?",o:["Las empresas multinacionales con sede en la UE","Los Estados miembros y las instituciones de la UE, con legitimación activa general sin necesitar acreditar interés específico ni afectación directa","Los ciudadanos europeos con más de 5 años de residencia","Las organizaciones internacionales reconocidas por la UE"],c:1,e:"Los demandantes privilegiados (Estados e instituciones de la UE) pueden interponer recurso de anulación sin acreditar interés directo ni afectación individual. Los particulares son 'demandantes no privilegiados' y deben cumplir el test Plaumann."},
{u:6,t:"¿Qué competencia especial tiene el Tribunal General en el ámbito sancionador (art. 261 TFUE)?",o:["Puede suspender cautelarmente las sanciones de la Comisión","Competencia de plena jurisdicción: puede modificar (reducir o confirmar) por propio criterio la cuantía de las sanciones impuestas por la Comisión","Solo puede anular o confirmar la sanción, sin modificar su cuantía","Puede imponer sanciones adicionales a las de la Comisión"],c:1,e:"La competencia de plena jurisdicción (art. 261 TFUE) va más allá del mero control de legalidad: el Tribunal General puede revisar y modificar la cuantía de multas en materia de competencia a petición de la empresa sancionada."},
{u:6,t:"¿Cuáles son los efectos de una sentencia de anulación según el art. 264 TFUE?",o:["Solo produce efectos para el futuro (ex nunc)","Declara el acto nulo con autoridad de cosa juzgada, generalmente con efecto retroactivo (ex tunc); el tribunal puede mantener ciertos efectos como definitivos por razones de seguridad jurídica","Obliga a la institución a adoptar de nuevo el mismo acto con diferente forma","Los efectos solo se producen tras la publicación en el DOUE"],c:1,e:"La anulación produce efectos ex tunc (retroactivos): el acto se considera como si nunca hubiera existido. Excepcionalmente, el tribunal puede mantener determinados efectos del acto anulado, p.ej. para proteger la seguridad jurídica o derechos adquiridos."},
{u:6,t:"¿Cuál es la diferencia entre vicios de legalidad externa e interna en el recurso de anulación?",o:["No existe tal distinción en el DUE","Legalidad externa: incompetencia y vicios sustanciales de forma (apreciables de oficio por el TJUE); legalidad interna: violación de tratados y desviación de poder (deben invocarlos las partes)","Legalidad externa se refiere al DI; legalidad interna, al DUE","Legalidad externa la controla el TG; legalidad interna, el TJ"],c:1,e:"Los vicios de legalidad externa (incompetencia, forma) pueden apreciarse de oficio por el tribunal. Los vicios de legalidad interna (violación de tratados, desviación de poder) deben ser alegados necesariamente por la parte demandante."},
{u:6,t:"¿En qué lengua se desarrollan las cuestiones prejudiciales ante el TJUE?",o:["Siempre en francés, lengua de trabajo del TJUE","En la lengua del juez nacional que formula la cuestión prejudicial","En la lengua elegida por las partes del litigio principal","En la lengua del Estado más afectado por la cuestión"],c:1,e:"En cuestiones prejudiciales la lengua de procedimiento es la del órgano jurisdiccional nacional remitente. En recursos directos, el demandante elige libremente entre las 24 lenguas oficiales de la UE."},
{u:6,t:"¿Qué es el 'pliego de cargos' en el procedimiento sancionador en materia de competencia?",o:["La sentencia final del TJUE en competencia","El documento donde la Comisión detalla los cargos imputados a una empresa; si la sanción incluye hechos no consignados, se vulnera el derecho de defensa","Una solicitud previa de información de la Comisión a las empresas investigadas","El recurso que interpone la empresa ante el TG contra la decisión de la Comisión"],c:1,e:"El pliego de cargos delimita el objeto del litigio y garantiza a la empresa conocer las acusaciones para preparar su defensa. Cualquier sanción basada en hechos no recogidos en él vulnera el derecho a ser oído (art. 41 Carta)."},
{u:6,t:"¿Cuándo puede la superación de un 'plazo razonable' causar la anulación de una sanción?",o:["Siempre que el procedimiento dure más de 2 años","Solo si la Comisión no justifica el retraso","Solo si se demuestra que el retraso obstaculizó el ejercicio efectivo del derecho de defensa","Nunca: el TJUE no controla los plazos administrativos de la Comisión"],c:2,e:"El plazo razonable no es causa de anulación automática. Requiere demostrar que el retraso causó indefensión real. El tribunal puede optar por reducir la multa en lugar de anular íntegramente la decisión."},
{u:6,t:"¿Qué es el recurso por omisión (art. 265 TFUE)?",o:["Un recurso para anular actos ilegales de las instituciones","Un mecanismo judicial para controlar las abstenciones ilegales de las instituciones de la UE cuando tenían obligación de pronunciarse","Un recurso de los ciudadanos ante el Defensor del Pueblo","Un procedimiento de urgencia ante el TG para medidas cautelares"],c:1,e:"El recurso por omisión controla la inactividad ilegal de las instituciones (PE, Consejo, Comisión, BCE) cuando, teniendo obligación de actuar o pronunciarse conforme al DUE, no lo hacen."},
{u:6,t:"¿Cómo se diferencia el control judicial en competencia del aplicable a agencias como la ECHA?",o:["No hay diferencia: ambos siguen el mismo procedimiento","En competencia no existe revisión interna ni sala de recursos: se acude directamente al TG mediante recurso de anulación, sin instancia previa","En competencia hay más instancias de recurso que en la ECHA","La ECHA aplica la plena jurisdicción; en competencia solo cabe la anulación"],c:1,e:"A diferencia de la ECHA (que dispone de Salas de Recurso interno), las decisiones de la Comisión en materia de competencia se impugnan directamente ante el Tribunal General mediante recurso de anulación sin instancia previa."},
{u:6,t:"¿Qué condiciones deben cumplir los particulares para interponer un recurso de anulación?",o:["Solo ser ciudadanos de la UE con domicilio en un Estado miembro","Demostrar que el acto les afecta directa e individualmente (test Plaumann), o que se trata de acto reglamentario que les afecta directamente sin incluir medidas de ejecución","Obtener autorización previa del TJ para interponer el recurso","Solo pueden recurrir si su Estado miembro no ha actuado previamente"],c:1,e:"Los particulares deben cumplir el 'test Plaumann': afectación directa e individual. El Tratado de Lisboa facilitó el acceso para los actos reglamentarios que no incluyen medidas de ejecución (art. 263.4 TFUE in fine), creando una vía más accesible para los ciudadanos."},
{u:6,t:"¿Cuál es la diferencia funcional entre el Tribunal de Justicia (TJ) y el Tribunal General (TG)?",o:["Son dos nombres para el mismo órgano jurisdiccional","El TJ conoce en primera instancia de recursos de particulares; el TG, en segunda instancia y de cuestiones prejudiciales","El TG conoce en primera instancia de recursos directos de particulares y empresas; el TJ conoce en casación (recursos contra sentencias del TG) y de cuestiones prejudiciales","El TG tiene competencia exclusiva en competencia; el TJ, en DDHH"],c:2,e:"El TG conoce en primera instancia de los recursos directos de particulares y empresas. El TJ resuelve en casación los recursos contra sentencias del TG y es el competente para las cuestiones prejudiciales. Esta división garantiza especialización y doble instancia."},
{u:6,t:"¿Cuál es la naturaleza jurídica del recurso por incumplimiento (arts. 258-260 TFUE)?",o:["Un mecanismo entre particulares para denunciar incumplimientos por empresas privadas","El procedimiento mediante el cual la Comisión (o un Estado miembro) lleva a otro Estado ante el TJUE por incumplir sus obligaciones del DUE, con posibilidad de sanciones económicas si no acata la sentencia","Un recurso que los ciudadanos interponen directamente ante el TJUE contra su propio Estado","El procedimiento de control de constitucionalidad de las normas de la UE"],c:1,e:"El recurso por incumplimiento (arts. 258-260 TFUE) permite a la Comisión (o a otro Estado) llevar a un Estado ante el TJUE. Si el Estado no cumple la sentencia declaratoria, el TJUE puede imponerle una suma a tanto alzado y/o multa periódica (art. 260 TFUE)."},
{u:6,t:"¿Qué son los vicios 'sustanciales' de forma y cuándo acarrean anulación?",o:["Cualquier error de procedimiento, por mínimo que sea, invalida el acto automáticamente","Infracciones graves de normas procedimentales que, de haber sido observadas, podrían haber dado lugar a un resultado sustancialmente distinto y que causaron indefensión real","Los errores tipográficos o de traducción en el texto oficial","Los vicios que se producen solo en la fase de votación del Consejo"],c:1,e:"El TJUE no es formalista: solo anula el acto cuando el vicio procedimental es fundamental, ha causado indefensión real y era susceptible de haber influido determinantemente en el contenido final del acto. Un mero defecto formal sin incidencia en el fondo no acarrea anulación."},
{u:6,t:"¿Qué establece el art. 267 TFUE sobre la obligatoriedad de plantear la cuestión prejudicial?",o:["Todos los jueces nacionales, sin excepción, están obligados a plantear la cuestión prejudicial cuando tengan dudas sobre el DUE","Los jueces nacionales pueden plantear la cuestión prejudicial de forma facultativa; solo los órganos de última instancia (cuya decisión no es susceptible de recurso) están obligados a hacerlo cuando la resolución del caso dependa de la interpretación del DUE","Solo los Tribunales Supremos y Constitucionales pueden plantear cuestiones prejudiciales","La cuestión prejudicial solo puede plantearse en asuntos penales"],c:1,e:"El art. 267 TFUE distingue: los órganos no de última instancia pueden plantear la cuestión (facultativa); los órganos de última instancia cuya decisión no es susceptible de recurso están obligados a plantearla cuando la interpretación del DUE sea necesaria para resolver el caso."},
{u:6,t:"¿Qué efecto tiene una sentencia prejudicial del TJUE sobre el litigio nacional y sobre los demás tribunales de la UE?",o:["Solo vincula al tribunal que planteó la cuestión en ese litigio concreto","La interpretación del TJUE vincula al tribunal remitente en ese litigio, pero también tiene autoridad de cosa interpretada erga omnes: todos los tribunales de la UE deben seguir esa interpretación en casos idénticos","La sentencia prejudicial no vincula a nadie; es solo una opinión consultiva del TJUE","El TJUE puede resolver directamente el litigio nacional sin devolvérselo al juez remitente"],c:1,e:"La sentencia prejudicial tiene un doble efecto: vincula al tribunal remitente en ese litigio concreto; y tiene autoridad de cosa interpretada que todos los tribunales de la UE deben respetar en casos idénticos. Esta autoridad erga omnes garantiza la aplicación uniforme del DUE."}
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildPool(){
  return BANK.map((q,k)=>{
    const idx=shuffle([0,1,2,3]);
    return{k,u:q.u,t:q.t,opts:idx.map(i=>q.o[i]),correct:idx.indexOf(q.c),e:q.e};
  });
}
let pool=buildPool();
const UNAMES={1:"UD1 · Génesis",2:"UD2 · Instituciones",3:"UD3 · Fuentes",4:"UD4 · Primacía",5:"UD5 · Ciudadanía",6:"UD6 · Judicial"};
const SK="due_v4";
let state={unit:0,mode:"all"};
let db=(()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{records:{}};}catch(e){return{records:{}};}})();
function save(){try{localStorage.setItem(SK,JSON.stringify(db));}catch(e){}}
function rec(k){if(!db.records[k])db.records[k]={ok:0,fail:0};return db.records[k];}
function pct(k){const r=rec(k),t=r.ok+r.fail;return t===0?-1:Math.round(r.ok/t*100);}
function ustat(u){
  const idxs=pool.filter(p=>p.u===u).map(p=>p.k);
  let ok=0,fail=0;
  idxs.forEach(k=>{const r=rec(k);ok+=r.ok;fail+=r.fail;});
  const ans=idxs.filter(k=>rec(k).ok+rec(k).fail>0).length;
  return{total:idxs.length,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):-1};
}
function gstat(){
  let ok=0,fail=0,ans=0;
  pool.forEach(p=>{const r=rec(p.k);ok+=r.ok;fail+=r.fail;if(r.ok+r.fail>0)ans++;});
  return{total:pool.length,ok,fail,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):0};
}
function adaptive(unit){
  let items=unit>0?pool.filter(p=>p.u===unit):pool;
  return items.map(p=>{
    const r=rec(p.k),t=r.ok+r.fail;
    let w=t===0?2:(r.ok/t<0.5?4:r.ok/t<0.75?3:r.ok/t<1?2:0.3);
    return{...p,w};
  }).sort((a,b)=>b.w-a.w).slice(0,20);
}
function filtered(){
  let items=state.unit>0?pool.filter(p=>p.u===state.unit):pool;
  if(state.mode==="fail")items=items.filter(p=>rec(p.k).fail>0);
  if(state.mode==="adaptive")items=adaptive(state.unit);
  return items;
}
function renderNav(){
  const tabs=[{v:0,l:"Todas"},...[1,2,3,4,5,6].map(u=>({v:u,l:"UD"+u}))];
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb${state.unit==t.v?" active":""}" onclick="setUnit(${t.v})">${t.l}</button>`).join("")
    +`<button class="nb${state.mode==="adaptive"?" active":""}" style="margin-left:auto" onclick="setMode('adaptive')">🎯 Adaptativo</button>`;
}
function renderStats(){
  const g=gstat();
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-n">${g.answered}/${g.total}</div><div class="stat-l">Respondidas</div></div>
    <div class="stat"><div class="stat-n" style="color:#0f6e56">${g.ok}</div><div class="stat-l">Correctas</div></div>
    <div class="stat"><div class="stat-n" style="color:#a32d2d">${g.fail}</div><div class="stat-l">Erróneas</div></div>
    <div class="stat"><div class="stat-n">${g.pct}%</div><div class="stat-l">% acierto</div></div>`;
  document.getElementById("prog").style.width=g.pct+"%";
}
function renderUBars(){
  document.getElementById("ubars").innerHTML=[1,2,3,4,5,6].map(u=>{
    const s=ustat(u);
    const p=s.pct<0?0:s.pct;
    const col=s.pct<0?"#b4b2a9":s.pct<50?"#e24b4a":s.pct<75?"#ef9f27":"#1d9e75";
    return`<div class="ubar" onclick="setUnit(${u})"><div class="ubar-title">${UNAMES[u]}</div><div class="ubar-track"><div class="ubar-fill" style="width:${p}%;background:${col}"></div></div><div class="ubar-pct">${s.pct<0?"sin datos":s.pct+"%"} · ${s.answered}/${s.total}</div></div>`;
  }).join("");
}
function renderCtrl(){
  document.getElementById("ctrl").innerHTML=`
    <button class="btn${state.mode==="all"?" active":""}" onclick="setMode('all')">Todas</button>
    <button class="btn${state.mode==="fail"?" active":""}" onclick="setMode('fail')">Solo erróneas</button>
    <button class="btn${state.mode==="adaptive"?" active":""}" onclick="setMode('adaptive')">🎯 Top 20 adaptativo</button>
    <button class="btn" onclick="reShuf()" title="Rebarajar opciones">🔀 Barajar</button>
    <button class="btn danger" onclick="if(confirm('¿Borrar todo el historial?')){db={records:{}};save();renderAll()}" style="margin-left:auto">Reiniciar</button>`;
}
function renderQuestions(){
  const items=filtered();
  if(!items.length){document.getElementById("questions").innerHTML=`<div class="empty">No hay preguntas en este filtro.</div>`;return;}
  let prev=null,html="";
  items.forEach(p=>{
    if(state.unit===0&&p.u!==prev){html+=`<div class="sep">${UNAMES[p.u]}</div>`;prev=p.u;}
    const r=rec(p.k),pc=pct(p.k);
    const badge=pc<0?"":
      `<span class="qpct" style="background:${pc>=75?"#eaf3de":pc>=50?"#faeeda":"#fcebeb"};color:${pc>=75?"#0f6e56":pc>=50?"#854f0b":"#a32d2d"}">${pc}% (${r.ok+r.fail}v)</span>`;
    html+=`<div class="qcard" id="qc-${p.k}">
      <div class="qhead"><span class="qbadge">${UNAMES[p.u]}</span><div class="qmeta">${badge}<span class="qnum">#${p.k+1}</span></div></div>
      <div class="qtext">${p.t}</div>
      <div class="opts">${p.opts.map((o,i)=>`<button class="opt" id="o-${p.k}-${i}" onclick="answer(${p.k},${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join("")}</div>
      <div id="ex-${p.k}"></div>
    </div>`;
  });
  document.getElementById("questions").innerHTML=html;
}
function answer(k,chosen){
  const p=pool[k],ok=chosen===p.correct,r=rec(k);
  if(ok)r.ok++;else r.fail++;
  save();
  document.getElementById("qc-"+k).classList.add(ok?"ok":"fail");
  for(let i=0;i<p.opts.length;i++){
    const b=document.getElementById("o-"+k+"-"+i);
    b.disabled=true;
    if(i===p.correct)b.classList.add("c-ok");
    if(i===chosen&&!ok)b.classList.add("c-fail");
  }
  document.getElementById("ex-"+k).innerHTML=`<div class="exp"><strong style="color:${ok?"#0f6e56":"#a32d2d"}">${ok?"✓ Correcto":"✗ Incorrecto"}</strong> ${p.e}</div>`;
  renderStats();renderUBars();
}
function setUnit(u){state.unit=parseInt(u);if(state.mode!=="adaptive")state.mode="all";renderAll();}
function setMode(m){state.mode=m;renderCtrl();renderQuestions();}
function reShuf(){pool=buildPool();renderAll();}
function renderAll(){renderNav();renderStats();renderUBars();renderCtrl();renderQuestions();}
renderAll();
</script>
</body>
</html>
