<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f4;color:#1a1a18;min-height:100vh;padding:1rem}
.wrap{max-width:780px;margin:0 auto}

.stat-l{font-size:11px;color:#888780;margin-top:1px}
.unit-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.8rem}
.ubar{background:#fff;border:1px solid #d3d1c7;border-radius:8px;padding:7px 9px;cursor:pointer}
.ubar:hover{border-color:#185fa5}
.ubar-title{font-size:11px;color:#888780;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ubar-fill{height:100%;border-radius:3px;transition:width .3s}
.ubar-pct{font-size:10px;color:#888780}
.prog-wrap{height:3px;background:#d3d1c7;border-radius:2px;margin-bottom:.8rem;overflow:hidden}

.qcard{background:#fff;border:1.5px solid #d3d1c7;border-radius:12px;padding:1.1rem;margin-bottom:.9rem;transition:border-color .15s,background .15s}

.qmeta{display:flex;gap:5px;align-items:center}

.opts{display:flex;flex-direction:column;gap:4px}
.opt{text-align:left;padding:9px 12px;border:1px solid #d3d1c7;border-radius:7px;background:#fff;cursor:pointer;font-size:13px;line-height:1.5;font-family:inherit}
.opt:hover:not(:disabled){background:#f1efe8}
.opt.c-ok{background:#eaf3de;border-color:#1d9e75;color:#0f6e56;font-weight:600}
.opt.c-fail{background:#fcebeb;border-color:#e24b4a;color:#a32d2d}
.exp{margin-top:.6rem;padding:8px 11px;background:#f1efe8;border-radius:7px;font-size:12px;color:#444441;line-height:1.6;border-left:3px solid #185fa5}
.empty{color:#888780;font-size:14px;padding:3rem;text-align:center;background:#fff;border-radius:12px;border:1px solid #d3d1c7}
.sep{font-size:12px;font-weight:600;color:#888780;margin:1.2rem 0 .4rem;padding-bottom:.3rem;border-bottom:1px solid #d3d1c7}

<h1>📚 GACE BVI · Semana 1 · Gestión Financiera (Ley 47/2003)</h1>

<script>
const BANK=[
// UD1 — Tema 51: El presupuesto, la LGP y la estabilidad presupuestaria ──────
{u:1,t:"¿Qué artículos de la Constitución Española constituyen la base del sistema presupuestario y de estabilidad?",o:["Artículos 31 y 133","Artículos 134 y 135","Artículos 103 y 106","Artículos 149 y 150"],c:1,e:"El art. 134 CE regula la elaboración, aprobación y contenido de los PGE; el art. 135 CE (reformado el 27/09/2011) recoge la estabilidad presupuestaria y el límite de deuda."},
{u:1,t:"¿Qué regula la Ley 47/2003, General Presupuestaria?",o:["Solo el procedimiento de contratación pública","El régimen presupuestario, económico-financiero, contable, de intervención y de control financiero del sector público estatal","Exclusivamente el régimen retributivo de los funcionarios","El régimen tributario estatal"],c:1,e:"La LGP (art. 1) tiene por objeto la regulación del régimen presupuestario, económico-financiero, de contabilidad, intervención y de control financiero del sector público estatal."},
{u:1,t:"¿Qué desarrolla la Ley Orgánica 2/2012, de Estabilidad Presupuestaria y Sostenibilidad Financiera (LOEPSF)?",o:["El art. 134 CE sobre elaboración de los PGE","El art. 135 CE, estableciendo reglas fiscales aplicables a TODAS las Administraciones Públicas","Únicamente el régimen de la Administración Local","El régimen de la Unión Europea en materia presupuestaria"],c:1,e:"La LOEPSF desarrolla el art. 135 CE y fija reglas fiscales (déficit, deuda, regla de gasto) aplicables a todas las AAPP, no solo al Estado."},
{u:1,t:"A 22 de junio de 2026, ¿qué Ley de Presupuestos Generales del Estado está vigente y por qué?",o:["La Ley de PGE 2026, aprobada en diciembre de 2025","La Ley 31/2022 (PGE 2023), prorrogada automáticamente para 2024, 2025 y 2026 ex art. 134.4 CE","No hay presupuesto vigente: España está sin Ley de Presupuestos","La Ley de PGE 2024, aprobada por decreto-ley"],c:1,e:"Al no haberse aprobado nuevos PGE, la Ley 31/2022 (PGE 2023) se prorroga automáticamente por tercer ejercicio consecutivo, conforme al art. 134.4 CE. El Consejo de Ministros aprobó los criterios de esta tercera prórroga el 23/12/2025."},
{u:1,t:"¿Desde cuándo está en vigor el nuevo marco europeo de gobernanza económica (Reglamentos UE 2024/1263 y 2024/1264 y Directiva 2024/1265)?",o:["1 de enero de 2024","30 de abril de 2024","1 de enero de 2026","27 de septiembre de 2011"],c:1,e:"El nuevo marco de gobernanza económica europea entró en vigor el 30/04/2024, desplazando buena parte de la lógica nacional de reglas fiscales hacia los Planes Fiscales y Estructurales de medio plazo."},
{u:1,t:"¿Cuándo se presentó el Plan Fiscal y Estructural de medio plazo de España y cuándo lo validó la Comisión Europea?",o:["Presentado en abril de 2024, validado en mayo de 2024","Presentado el 15 de octubre de 2024, validado el 26 de noviembre de 2024","Presentado en enero de 2025, aún sin validar","No se ha presentado ningún plan español"],c:1,e:"El Plan español se presentó el 15/10/2024 y fue validado por la Comisión Europea el 26/11/2024, en el marco del nuevo sistema de gobernanza económica de la UE."},
{u:1,t:"¿Desde cuándo se reactivaron las reglas fiscales nacionales tras su suspensión por la cláusula general de salvaguarda (pandemia)?",o:["Desde el 1 de enero de 2021","Desde el 1 de enero de 2023","Desde el 1 de enero de 2024, tras la suspensión entre 2020 y 2023","Nunca se han reactivado"],c:2,e:"Las reglas fiscales estuvieron suspendidas entre 2020 y 2023 por la cláusula de salvaguarda activada por la pandemia, y se reactivaron el 1 de enero de 2024."},
{u:1,t:"¿Qué naturaleza jurídica tiene la Ley 47/2003, General Presupuestaria?",o:["Ley Orgánica","Ley ordinaria","Decreto-ley permanente","Reglamento del Gobierno"],c:1,e:"La LGP es una ley ordinaria; no está en el catálogo de leyes orgánicas del art. 81 CE, a diferencia de la LOEPSF que sí es Ley Orgánica."},
{u:1,t:"¿Qué reforma introdujo la Ley Orgánica 2/2024, de 1 de agosto, en la LOEPSF?",o:["Suprimió la regla de gasto","Modificó el art. 15.6 LOEPSF, tras el rechazo del Senado a una reforma previa","Eliminó el Fondo de Contingencia","Trasladó la competencia presupuestaria a las Comunidades Autónomas"],c:1,e:"La LO 2/2024, de 1 de agosto, modificó el art. 15.6 LOEPSF tras el rechazo del Senado a la reforma que se pretendía introducir por otra vía."},
{u:1,t:"¿Qué Orden dicta las normas para la elaboración de los Presupuestos Generales del Estado para 2026?",o:["Orden HAC/974/2025, de 1 de septiembre","Orden HAP/1357/2013, de 11 de julio","Orden PRE/1576/2002, de 19 de junio","Orden HFP/147/2022, de 2 de marzo"],c:0,e:"La Orden HAC/974/2025, de 1 de septiembre (BOE 03-IX-2025), dicta las normas de elaboración de los PGE 2026, aunque estos PGE no llegaron a aprobarse y rige la prórroga."},
{u:1,t:"¿Cuáles son los cuatro planos normativos que articulan el presupuesto público como institución jurídica?",o:["Estatal, autonómico, local y europeo","Constitucional, legal estatal, orgánico de disciplina fiscal y europeo de coordinación económica","Civil, penal, administrativo y mercantil","Ejecutivo, legislativo, judicial y de control"],c:1,e:"El estudio del presupuesto exige el plano constitucional (arts. 134-135 CE), el legal estatal (LGP), el orgánico de disciplina fiscal (LOEPSF) y el europeo de coordinación económica (Reglamentos UE 2024), este último con relevancia creciente desde la reforma de 2024."},
{u:1,t:"¿Qué reformas relevantes ha tenido la LOEPSF antes de la LO 2/2024?",o:["Ninguna: el texto de 2012 sigue intacto","LO 9/2013 (morosidad), LO 6/2015 (financiación CCAA) y LO 1/2016 (DA 7ª, Gobierno en funciones)","Solo ha sido modificada por reglamentos europeos","Fue derogada y sustituida por la Ley 47/2003"],c:1,e:"La LOEPSF ha sido objeto de varias reformas: LO 9/2013 (morosidad), LO 6/2015 (financiación de las CCAA) y LO 1/2016 (DA 7ª, sobre Gobierno en funciones), antes de la más reciente LO 2/2024."},
// UD2 — Tema 52: Leyes anuales de presupuestos, elaboración y estructura ─────
{u:2,t:"Según la doctrina del Tribunal Constitucional, ¿qué naturaleza jurídica tiene la Ley de Presupuestos Generales del Estado?",o:["Ley orgánica con rango reforzado","Ley singular sin procedimiento especial","Ley ordinaria de tramitación preferente, con un procedimiento especial de tramitación previsto en el art. 134 CE","Un reglamento del Gobierno con fuerza de ley"],c:2,e:"Aunque parte de la doctrina la calificó de 'ley singular', el TC ha reiterado que la Ley de PGE es una ley ordinaria con un procedimiento especial de tramitación (art. 134 CE), y no está en el catálogo de leyes orgánicas del art. 81 CE."},
{u:2,t:"¿A quién corresponde la iniciativa exclusiva para presentar el proyecto de Ley de Presupuestos Generales del Estado?",o:["A las Cortes Generales","Al Gobierno","Al Tribunal de Cuentas","A la Comisión Europea"],c:1,e:"Las Cortes Generales autorizan anualmente los gastos e ingresos a iniciativa EXCLUSIVA del Gobierno: el Gobierno propone y el Parlamento dispone."},
{u:2,t:"¿En qué Título y artículos de la LGP se regula la Ley de Presupuestos Generales del Estado?",o:["Título I, arts. 1-19","Título II, arts. 32-49","Título VI, arts. 140-175","Título IV, arts. 78-89"],c:1,e:"El Título II de la LGP (arts. 32 a 49) regula la Ley de Presupuestos Generales del Estado: contenido, elaboración y estructura."},
{u:2,t:"¿Cuáles son los tres criterios con los que se desglosan las aplicaciones presupuestarias (el llamado 'churro presupuestario')?",o:["Territorial, sectorial y temporal","Orgánica, por programas y económica","Civil, administrativa y penal","Nacional, autonómica y local"],c:1,e:"Toda aplicación presupuestaria se codifica conforme a tres clasificaciones: orgánica (qué órgano gasta), por programas (en qué finalidad) y económica (qué naturaleza tiene el gasto: capítulo/artículo/concepto/subconcepto)."},
{u:2,t:"En el ESTADO, ¿a qué nivel vincula el crédito del Capítulo 2 (gastos corrientes en bienes y servicios) frente al Capítulo 6 (inversiones reales)?",o:["Ambos vinculan a nivel de capítulo","Cap. 2 vincula a nivel de ARTÍCULO; Cap. 6 también vincula a nivel de CAPÍTULO, pero por razones distintas","Ambos vinculan a nivel de subconcepto","Cap. 2 vincula a nivel de capítulo; Cap. 6 a nivel de artículo"],c:1,e:"Dato muy preguntado: en el Estado, el Cap. 2 vincula a nivel de ARTÍCULO (art. 43 LGP) y el Cap. 6 vincula a nivel de CAPÍTULO (también art. 43 LGP). En los Organismos Autónomos, AMBOS capítulos vinculan a nivel de capítulo (art. 44 LGP) — trampa clásica de examen."},
{u:2,t:"¿Qué norma fija los códigos de la clasificación económica del gasto, complementada cada año por la Orden de elaboración de los PGE?",o:["El Real Decreto 887/2006","La Resolución de la Dirección General de Presupuestos de 20 de enero de 2014","La Orden de 1 de febrero de 1996 (IOC)","El Real Decreto 640/1987"],c:1,e:"La Resolución de la DG de Presupuestos de 20 de enero de 2014 fija el texto base de los códigos de clasificación económica, complementado anualmente por la Orden de elaboración de los PGE de cada ejercicio."},
{u:2,t:"¿Está la Ley de Presupuestos Generales del Estado incluida en el catálogo de leyes orgánicas del art. 81 CE?",o:["Sí, siempre requiere mayoría absoluta del Congreso","No: es una ley ordinaria, aunque con procedimiento especial de tramitación","Solo cuando incluye medidas tributarias","Solo en años de prórroga presupuestaria"],c:1,e:"La Ley de PGE NO está en el catálogo del art. 81 CE (leyes orgánicas). Es una ley ordinaria con tramitación preferente y un procedimiento especial regulado en el art. 134 CE."},
{u:2,t:"¿Qué significa que la tramitación de la Ley de Presupuestos sea 'preferente'?",o:["Que se aprueba sin pasar por el Senado","Que tiene prioridad temporal sobre otros proyectos legislativos en las Cortes Generales","Que no puede ser enmendada","Que se tramita por el procedimiento de urgencia exclusivamente en el Senado"],c:1,e:"La tramitación preferente implica prioridad temporal: el proyecto de Ley de Presupuestos se antepone a otros proyectos legislativos pendientes en las Cortes Generales."},
{u:2,t:"En los Organismos Autónomos, ¿a qué nivel vincula el crédito del Capítulo 2?",o:["A nivel de artículo, igual que en el Estado","A nivel de CAPÍTULO (art. 44 LGP), a diferencia del Estado donde vincula a nivel de artículo","A nivel de subconcepto","No tiene nivel de vinculación: es libre"],c:1,e:"En los Organismos Autónomos el Cap. 2 vincula a nivel de CAPÍTULO (art. 44 LGP). En el Estado, en cambio, vincula a nivel de ARTÍCULO (art. 43 LGP). Es una de las distinciones más preguntadas en examen."},
{u:2,t:"¿Qué Orden dicta las normas de elaboración de los Presupuestos Generales del Estado para 2026?",o:["Orden HAC/974/2025, de 1 de septiembre","Orden HAC/1517/2025, de 18 de diciembre","Orden HAP/1357/2013, de 11 de julio","Orden HFP/147/2022, de 2 de marzo"],c:0,e:"La Orden HAC/974/2025, de 1 de septiembre, dicta las normas para la elaboración de los PGE 2026 (BOE 03-IX-2025), aunque el proyecto no llegó a aprobarse."},
{u:2,t:"¿Qué principios rigen la programación y gestión del presupuesto del Estado según la LGP?",o:["Únicamente el de anualidad","Programación, transparencia, eficiencia en la asignación y utilización de recursos, entre otros principios de buena gestión financiera","Solo el de unidad de caja","Exclusivamente el de estabilidad presupuestaria"],c:1,e:"La LGP exige que la elaboración y gestión del presupuesto responda a principios de programación, transparencia, eficiencia y buena gestión financiera, además de la estabilidad presupuestaria de la LOEPSF."},
{u:2,t:"¿Qué Real Decreto-ley completa la prórroga de los PGE 2023 para el ejercicio 2026?",o:["Real Decreto-ley 36/2020","Real Decreto-ley 16/2025, de 23 de diciembre","Real Decreto-ley 6/2022","Real Decreto-ley 11/2022"],c:1,e:"El Real Decreto-ley 16/2025, de 23 de diciembre (DA 1ª), mantiene la vigencia en 2026 de los Títulos IV y VIII y disposiciones adicionales concordantes de la Ley 31/2022, formalizando la tercera prórroga presupuestaria."},
// UD3 — Tema 55: Procedimiento de ejecución del gasto, fases y documentos ───
{u:3,t:"¿Qué artículo de la LGP fija las cinco fases del procedimiento de ejecución del presupuesto de gastos?",o:["Artículo 47","Artículo 73","Artículo 134","Artículo 27"],c:1,e:"El art. 73 LGP articula el procedimiento en dos grandes etapas (ordenación del gasto y ordenación del pago) y cinco fases sucesivas: Aprobación, Compromiso, Reconocimiento de la obligación, Ordenación del pago y Pago material."},
{u:3,t:"¿Cuál es la diferencia esencial entre 'gastar' y 'pagar' en el procedimiento de ejecución presupuestaria?",o:["Son sinónimos jurídicos sin distinción práctica","Gastar es reconocer una obligación frente a un tercero (fases 1ª a 3ª, sin movimiento de fondos); pagar es la salida material de fondos del Tesoro (fases 4ª y 5ª)","Gastar es competencia del Tesoro; pagar, del Ministerio gestor","Pagar es siempre anterior a gastar"],c:1,e:"Distinción clásica de examen: gastar = reconocer la obligación (fases A, D, O/OK — sin movimiento de dinero); pagar = salida efectiva de fondos del Tesoro Público (fases de ordenación del pago y pago material)."},
{u:3,t:"En el Estado, ¿qué órganos gestionan respectivamente el gasto y el pago, y qué documento conecta ambas fases?",o:["El mismo órgano gestiona ambos; no existe documento de conexión","El Ministerio gestiona el gasto y la Dirección General del Tesoro y Política Financiera (DGTPF) gestiona el pago; el documento de conexión es la propuesta de pago (K)","La DGTPF gestiona el gasto; el Ministerio gestiona el pago","El Tribunal de Cuentas gestiona ambas fases"],c:1,e:"En la AGE el gestor del gasto (Ministerio) es distinto del gestor del pago (DGTPF). Por eso existe la propuesta de pago (documento K), que el primero remite al segundo."},
{u:3,t:"En los Organismos Autónomos, ¿por qué no existe el documento OK sino el documento O?",o:["Porque los OO.AA. no reconocen obligaciones","Porque el mismo órgano (Presidente o Director) gestiona las fases de gasto y de pago, por lo que no se precisa propuesta de pago","Porque los OO.AA. están exentos de fiscalización previa","Porque el documento O es exclusivo de la Seguridad Social"],c:1,e:"En los OO.AA. coincide el órgano que gestiona el gasto con el que gestiona el pago (Presidente o Director), por lo que no es necesaria la propuesta de pago: se utiliza el documento O en lugar del OK."},
{u:3,t:"¿Qué efecto jurídico produce la fase de Aprobación (A) del gasto?",o:["Extinción de la obligación","Reserva de crédito","Vinculación frente a terceros","Mandato formal de pago"],c:1,e:"La fase 1ª, Aprobación (A), tiene como efecto jurídico la reserva del crédito presupuestario para el gasto de que se trate."},
{u:3,t:"¿Qué efecto jurídico produce la fase de Compromiso o Disposición (D)?",o:["Reserva de crédito","Vinculación frente a terceros","Crédito exigible","Extinción de la obligación"],c:1,e:"La fase 2ª, Compromiso (D), vincula a la Administración frente a terceros: a partir de este momento existe un compromiso jurídico, aunque la obligación aún no sea exigible."},
{u:3,t:"¿Por qué se denomina al procedimiento ordinario de ejecución del gasto 'procedimiento de pagos en firme'?",o:["Porque los pagos no pueden anularse nunca","Porque primero se justifica la prestación y después se paga, a diferencia de los anticipos de caja fija y pagos a justificar donde el orden se invierte","Porque solo se aplica a gastos superiores a 5.000 €","Porque requiere sentencia judicial firme"],c:1,e:"En el procedimiento ordinario ('pagos en firme') el orden es: primero se justifica la prestación, después se paga. En ACF y PaJ el orden se invierte: se paga primero y se justifica después."},
{u:3,t:"Conforme al art. 74.1 LGP, ¿a quién corresponde aprobar, comprometer y reconocer obligaciones de los presupuestos de los Departamentos ministeriales?",o:["Al Ministro de Hacienda en todo caso","A los Ministros y titulares de órganos con dotaciones diferenciadas en los PGE, salvo lo reservado por ley al Consejo de Ministros","Exclusivamente a los Secretarios de Estado","Al Tribunal de Cuentas"],c:1,e:"El art. 74.1 LGP atribuye a los Ministros y a los titulares de órganos con dotaciones diferenciadas la competencia para aprobar y comprometer gastos, reconocer obligaciones e interesar el pago, salvo los casos reservados al Consejo de Ministros."},
{u:3,t:"¿Quién ordena los pagos en el ámbito de la Seguridad Social, según el art. 75 LGP?",o:["El Ministro de Hacienda","El Director General de la Tesorería General de la Seguridad Social","El Presidente del Organismo Autónomo correspondiente","El Interventor General"],c:1,e:"En la Seguridad Social, la aprobación y compromiso corresponde a los directores de las entidades gestoras, pero la ordenación de pagos está atribuida al Director General de la Tesorería General de la Seguridad Social (art. 75 LGP)."},
{u:3,t:"¿Cuál es la diferencia entre delegación y desconcentración de las competencias de ejecución del gasto?",o:["Son sinónimos en la LGP","La delegación traslada solo el ejercicio (vía reglamentaria) manteniendo la titularidad; la desconcentración traslada titularidad y ejercicio (requiere Real Decreto del Consejo de Ministros)","La delegación es permanente; la desconcentración, temporal","La desconcentración solo se aplica a Organismos Autónomos"],c:1,e:"Delegación: se traslada solo el ejercicio de la competencia, conservando la titularidad el órgano delegante (instrumentada por vía reglamentaria). Desconcentración: se traslada también la titularidad, y exige Real Decreto del Consejo de Ministros (art. 74 LGP)."},
{u:3,t:"¿A partir de qué importe los convenios o contratos-programa con otras Administraciones requieren autorización previa del Consejo de Ministros (art. 74.5 LGP)?",o:["3.000.000 €","5.000.000 €","12.000.000 €","20.000.000 €"],c:2,e:"El art. 74.5 LGP exige autorización previa del Consejo de Ministros cuando el importe del gasto derivado del convenio o contrato-programa sea superior a 12.000.000 €."},
{u:3,t:"¿Qué documentos contables intervienen en la ejecución ordinaria del gasto en el Estado, en orden?",o:["RC, A, D, OK y Pago","Solo ADOK","PMP y PPJ","MC050 y MC060"],c:0,e:"La secuencia documental ordinaria es: RC (Retención de Crédito, previa), A (Aprobación), D (Disposición/Compromiso), OK (Reconocimiento de la obligación y propuesta de pago conjuntos en el Estado) y, finalmente, el Pago material."},
{u:3,t:"¿Qué tienen en común la contratación administrativa (LCSP) y la gestión de subvenciones (LGS) respecto al procedimiento de ejecución del gasto?",o:["Ninguna relación: son procedimientos totalmente independientes","Ambas constituyen los principales 'gastos de fondo' que se tramitan siguiendo las fases de ejecución del presupuesto, con referencias cruzadas en la LGP a la LCSP (arts. 117 y 324) y a la LGS","Solo la LCSP exige fiscalización previa","Solo la LGS requiere documento RC"],c:1,e:"El Tema 55 dedica especial referencia a la contratación administrativa y la gestión de subvenciones porque ambas constituyen los principales procedimientos materiales (gastos de fondo) que recorren las fases de ejecución presupuestaria, con remisiones expresas en la LGP a la LCSP (arts. 117, 324) y a la LGS."},
{u:3,t:"¿Qué dos técnicas existen para que los Ministros trasladen el ejercicio de sus competencias de ejecución del gasto a Secretarios de Estado y Subsecretarios?",o:["Avocación y sustitución","Delegación (vía reglamentaria) y desconcentración (vía Real Decreto del Consejo de Ministros)","Encomienda de gestión y consorcio","Suplencia y abstención"],c:1,e:"Los Ministros pueden fijar límites cuantitativos por debajo de los cuales sus competencias se ejercen por Secretarios de Estado/Subsecretarios mediante delegación (instrumentada reglamentariamente) o desconcentración (que exige Real Decreto del Consejo de Ministros y traslada también la titularidad)."},
// UD4 — Tema 53: Gastos plurianuales y modificaciones de crédito ────────────
{u:4,t:"¿Cuál es la dotación anual del Fondo de Contingencia y quién autoriza su disposición?",o:["1% del gasto no financiero; lo autoriza el Ministro de Hacienda en solitario","2% del límite de gasto no financiero del Estado; lo autoriza el Consejo de Ministros a propuesta del Ministro de Hacienda","5% del gasto total; lo autorizan las Cortes Generales","3% del gasto corriente; lo autoriza el Tribunal de Cuentas"],c:1,e:"El Fondo de Contingencia (art. 50 LGP) se dota anualmente con el 2% del límite de gasto no financiero del Estado. Su disposición exige acuerdo del Consejo de Ministros a propuesta del Ministro de Hacienda, salvo que corresponda a las Cortes Generales."},
{u:4,t:"Para comprometer gastos plurianuales (art. 47 LGP), ¿qué tres condiciones deben cumplirse de forma acumulativa?",o:["Autorización de la UE, informe del Tribunal de Cuentas y dictamen del Consejo de Estado","Ejecución iniciada en el ejercicio corriente, máximo 4 ejercicios posteriores, y porcentajes legales sobre el crédito inicial por anualidad","Aprobación por ley orgánica, informe favorable del Parlamento y publicación en el DOUE","Solo se exige crédito suficiente en el ejercicio corriente"],c:1,e:"El art. 47 LGP exige, de forma acumulativa: (i) ejecución iniciada en el ejercicio corriente, (ii) máximo 4 ejercicios posteriores al del compromiso, y (iii) el gasto de cada anualidad no exceda los porcentajes legales (70/60/50/50%) sobre el crédito inicial."},
{u:4,t:"¿Cuáles son los porcentajes máximos del art. 47.2 LGP para comprometer gasto plurianual en las anualidades 1ª, 2ª, 3ª y 4ª?",o:["100/100/100/100%","70/60/50/50%","50/50/50/50%","90/70/50/30%"],c:1,e:"Art. 47.2 LGP: anualidad 1ª (x+1) hasta 70%; anualidad 2ª (x+2) hasta 60%; anualidades 3ª y 4ª (x+3, x+4) hasta 50% cada una, sobre el crédito inicial de la operación."},
{u:4,t:"¿Qué dos tipos de gasto quedan EXCEPTUADOS de los límites del art. 47.2 LGP en materia de gastos plurianuales?",o:["Gastos de personal y subvenciones","La carga financiera de la Deuda Pública (Cap. 3, intereses) y los arrendamientos de bienes inmuebles (concepto 202)","Gastos de inversión y transferencias de capital","No existen excepciones a este límite"],c:1,e:"Los límites del art. 47.2 LGP no se aplican a la carga financiera de la Deuda Pública (intereses, Cap. 3) ni a los arrendamientos de inmuebles, incluidos los contratos mixtos de arrendamiento y adquisición (concepto 202)."},
{u:4,t:"En un contrato de obra plurianual (salvo abono total del precio), ¿qué retención adicional exige el art. 47.2 LGP y con qué documento se materializa?",o:["20% del importe, documento MC080","10% del importe de adjudicación, documento RC 108, en fase D","5% del importe, documento ADOK","No existe retención adicional en obras plurianuales"],c:1,e:"En los contratos de obra plurianuales (salvo abono total del precio) se exige una retención adicional del 10% del importe de adjudicación, materializada con el documento contable RC 108 en la fase D (adjudicación)."},
{u:4,t:"¿Cuántas anualidades posteriores se admiten, como regla, para los gastos plurianuales financiados con cargo al Mecanismo de Recuperación y Resiliencia (MRR)?",o:["4 anualidades, igual que el régimen general","3 anualidades posteriores (en lugar de 4), con porcentajes 70-60-50%","2 anualidades, con porcentaje único del 50%","6 anualidades, sin límite de porcentaje"],c:1,e:"Los gastos plurianuales del MRR siguen un régimen especial: como regla, máximo 3 anualidades posteriores (no 4) con porcentajes 70%-60%-50%. Las elevaciones excepcionales requieren informe del Director General del Plan y Mecanismo de Recuperación y Resiliencia, no de la DG de Presupuestos."},
{u:4,t:"Si en un ejercicio posterior no hay crédito suficiente para cumplir un compromiso plurianual ya adquirido, ¿cuál es la secuencia que establece el art. 47 bis LGP?",o:["Resolución inmediata del contrato sin más trámite","Comunicación al tercero → reprogramación de anualidades si es posible → resolución del negocio jurídico con compensaciones, como último recurso","Recurso directo ante el TJUE","Suspensión automática de todos los contratos del Departamento"],c:1,e:"El art. 47 bis LGP regula una secuencia escalonada: primero comunicación al tercero, después reprogramación con reajuste de anualidades si las disponibilidades lo permiten, y solo en último término, resolución del negocio jurídico con las compensaciones que procedan."},
{u:4,t:"¿Cuáles son las seis figuras de modificación de crédito reguladas en la LGP y sus artículos?",o:["Todas se regulan en un único artículo, el 47","Transferencias (art. 52), generaciones (art. 53), ampliaciones (art. 54), créditos extraordinarios y suplementos (arts. 55-56) e incorporaciones (art. 58)","Solo existen transferencias y ampliaciones","Créditos extraordinarios, bajas por anulación y anticipos de tesorería únicamente"],c:1,e:"La LGP regula seis figuras: transferencias (art. 52), generaciones (art. 53), ampliaciones (art. 54), créditos extraordinarios y suplementos (arts. 55-56) e incorporaciones de remanentes (art. 58). El anticipo de tesorería (art. 60) NO es propiamente una modificación de crédito."},
{u:4,t:"¿Cuál es la diferencia clave entre transferencia de crédito y simple redistribución de crédito?",o:["No hay diferencia: son sinónimos","La transferencia altera la clasificación orgánica, por programas, o el nivel de vinculación económica; la redistribución opera dentro del mismo nivel de vinculación y no requiere autorización especial","La redistribución solo cabe en Organismos Autónomos","La transferencia nunca afecta a la clasificación económica"],c:1,e:"Si cambia la sección/servicio (orgánica), el programa, o el nivel de vinculación económica, hay transferencia de crédito (sujeta a las limitaciones del art. 52 LGP). Si se mueve dentro del mismo nivel de vinculación sin cambiar esos elementos, es una mera redistribución, que no requiere autorización especial."},
{u:4,t:"¿Cuál de las siguientes es una limitación del art. 52.1 LGP a las transferencias de crédito?",o:["No pueden transferirse créditos desde operaciones financieras (Cap. 8 y 9) al resto, ni desde operaciones de capital (Cap. 6 y 7) a corrientes (Cap. 1 a 4)","No pueden hacerse transferencias dentro de la misma sección","Está prohibido transferir crédito del Capítulo 1 en cualquier caso","Las transferencias siempre requieren ley orgánica"],c:0,e:"El art. 52.1 LGP prohíbe transferir crédito desde operaciones financieras (Cap. 8-9) al resto, y desde operaciones de capital (Cap. 6-7) a operaciones corrientes (Cap. 1-4), entre otras limitaciones orgánicas y por origen del crédito."},
{u:4,t:"¿Cuál es la diferencia esencial entre crédito extraordinario y suplemento de crédito?",o:["No hay diferencia: ambos requieren ley","El crédito extraordinario se concede cuando NO existe ninguna dotación previa para el gasto; el suplemento, cuando existe dotación pero resulta insuficiente","El suplemento es competencia de las Cortes y el extraordinario del Consejo de Ministros siempre","El crédito extraordinario solo se aplica a Organismos Autónomos"],c:1,e:"Diferencia clásica de examen: crédito extraordinario = el gasto NO estaba previsto (no existe aplicación presupuestaria); suplemento de crédito = el gasto SÍ estaba previsto pero la dotación es insuficiente y no puede cubrirse por vía menos excepcional."},
{u:4,t:"En el Estado, ¿quién autoriza un crédito extraordinario u suplemento financiado con baja en el Fondo de Contingencia, para operaciones no financieras?",o:["Las Cortes Generales mediante ley","El Consejo de Ministros","El Ministro de Hacienda en solitario","El Tribunal de Cuentas"],c:1,e:"Cuando la financiación de un crédito extraordinario o suplemento (operaciones no financieras, Cap. 1-7) procede de una baja en el Fondo de Contingencia, la autorización corresponde al Consejo de Ministros. Si la baja es en otros créditos no financieros, corresponde a las Cortes Generales mediante ley."},
{u:4,t:"¿Qué tres requisitos acumulativos exige una ampliación de crédito (art. 54 LGP), a diferencia del suplemento?",o:["Gasto inaplazable + previsto pero insuficiente + el crédito tiene la condición legal de AMPLIABLE","Gasto aplazable + previsto + crédito ordinario","Solo se exige que exista dotación inicial","Gasto inaplazable + no previsto + autorización de las Cortes"],c:0,e:"La ampliación exige: (i) gasto inaplazable, (ii) gasto previsto pero insuficientemente dotado, y (iii) que el crédito tenga la condición legal de ampliable (declarado así por la LGP o por la Ley de PGE). Esta tercera condición es lo único que distingue la ampliación del suplemento."},
{u:4,t:"¿Cuáles de los siguientes créditos están declarados AMPLIABLES por la normativa presupuestaria?",o:["Únicamente los del Ministerio de Defensa","Los de la Sección 06 (Deuda Pública), Sección 07 (Clases Pasivas), y las cuotas de la Seguridad Social, MUFACE, ISFAS y MUGEJU (subconceptos 160.00 a 160.03), entre otros","Solo los créditos de subvenciones nominativas","Ningún crédito está declarado ampliable: todo se tramita por suplemento"],c:1,e:"Tienen carácter ampliable, entre otros: todos los créditos de la Sección 06 (Deuda Pública) y Sección 07 (Clases Pasivas), los subconceptos 160.00-160.03 (cuotas SS, MUFACE, ISFAS, MUGEJU) y los créditos para el pago de sentencias judiciales firmes."},
{u:4,t:"¿Qué cuatro supuestos tasados permiten la incorporación de remanentes de crédito (art. 58 LGP)?",o:["Cualquier remanente no ejecutado puede incorporarse libremente","Norma con rango de ley, remanentes de generaciones de crédito, remanentes de anticipos de tesorería pendientes de convalidación, y remanentes de créditos extraordinarios/suplementos del último mes del ejercicio anterior","Solo remanentes de subvenciones","Solo remanentes del Capítulo 6"],c:1,e:"El art. 58 LGP enumera de forma cerrada cuatro supuestos: (1) norma con rango de ley, (2) remanentes de generaciones de crédito [hoy suspendido por la Ley 31/2022 prorrogada, salvo servicio 50 MRR], (3) remanentes de anticipos de tesorería pendientes de convalidación, y (4) remanentes de créditos extraordinarios/suplementos del último mes del ejercicio anterior."},
{u:4,t:"¿Cuántas fuentes de ingreso tasadas permiten generar crédito conforme al art. 53 LGP?",o:["Una sola: cualquier ingreso superior al previsto","Seis fuentes tasadas y cerradas (aportaciones de terceros, reembolsos de préstamos, reintegros, ingresos afectados, venta de bienes corrientes, enajenación de inmovilizado)","Tres fuentes: impuestos, tasas y precios públicos","No existe limitación de fuentes: cualquier ingreso genera crédito"],c:1,e:"El art. 53 LGP enumera taxativamente seis fuentes: a) aportaciones de terceros para gastos específicos, b) reembolsos de préstamos, c) reintegros de pagos indebidos, d) ingresos legalmente afectados, e) venta de bienes corrientes y servicios, f) enajenación de inmovilizado."},
{u:4,t:"¿Cuál es el límite cuantitativo y la naturaleza jurídica del anticipo de tesorería (art. 60 LGP)?",o:["10% de los créditos del Estado; es una modificación de crédito ordinaria","1% de los créditos autorizados al Estado por la Ley de Presupuestos; es una operación NO presupuestaria, no una modificación de crédito","50% del Fondo de Contingencia; requiere ley orgánica","No tiene límite cuantitativo"],c:1,e:"El anticipo de tesorería (art. 60 LGP) tiene un límite del 1% de los créditos autorizados al Estado por la Ley de PGE. No es una modificación de crédito ni una operación presupuestaria: es un instrumento financiero temporal hasta que se regulariza con la imputación al crédito posteriormente aprobado."},
{u:4,t:"¿Qué documento contable identifica a las generaciones de crédito en la Instrucción de Operatoria Contable?",o:["MC 050","MC 060/061","MC 070","MC 080"],c:3,e:"El documento contable MC 080 corresponde a las generaciones de crédito (art. 53 LGP). Para comparar: MC 050 = ampliaciones, MC 060/061 = transferencias (positivo/negativo), MC 070 = incorporaciones."},
// UD5 — Tema 56: Capítulos de gasto, Anticipos de Caja Fija y Pagos a Justificar ─
{u:5,t:"¿A qué nivel vincula el crédito del Capítulo 2 en el Estado, y a qué nivel en los Organismos Autónomos?",o:["Artículo en ambos casos","Artículo en el Estado (art. 43 LGP); CAPÍTULO en los OO.AA. (art. 44 LGP)","Capítulo en ambos casos","Subconcepto en el Estado; artículo en los OO.AA."],c:1,e:"Distinción de alta frecuencia en examen: en el Estado, el Cap. 2 vincula a nivel de ARTÍCULO (art. 43 LGP); en los Organismos Autónomos, vincula a nivel de CAPÍTULO (art. 44 LGP)."},
{u:5,t:"Según la regla mnemotécnica del leasing, ¿en qué capítulo se imputa un leasing SIN opción de compra y en cuál uno CON opción de compra?",o:["Ambos en el Capítulo 6","SIN opción de compra → Capítulo 2 (art. 20); CON opción de compra → Capítulo 6 (art. 64)","SIN opción de compra → Capítulo 6; CON opción de compra → Capítulo 2","Ambos en el Capítulo 4, como transferencia"],c:1,e:"Leasing SIN opción de compra = arrendamiento puro → Cap. 2, art. 20 (arrendamientos y cánones). Leasing CON opción de compra → Cap. 6, art. 64 (inversión inmaterial), porque al ejercer la opción el bien se incorpora al patrimonio."},
{u:5,t:"¿Dónde se imputan los seguros de bienes (incendio, robo, vehículos) y dónde los seguros de personal (vida, accidentes)?",o:["Ambos en el Capítulo 1","Seguros de bienes → Cap. 2, concepto 224; seguros de personal → Cap. 1, concepto 162.05","Ambos en el Capítulo 2, concepto 224","Seguros de bienes → Cap. 6; seguros de personal → Cap. 4"],c:1,e:"Regla de memorización: los seguros DE BIENES (incendio, robo, vehículos) van al Cap. 2, concepto 224. Los seguros DE PERSONAL (vida, accidentes) van al Cap. 1, concepto 162.05, porque son gasto de personal."},
{u:5,t:"Las indemnizaciones por razón del servicio (dietas, gastos de locomoción) percibidas por un funcionario, ¿en qué capítulo se imputan y por qué es relevante?",o:["Capítulo 1, porque son retribución del funcionario","Capítulo 2 (artículo 23), aunque sean percepciones del funcionario, porque NO se recogen en nómina","Capítulo 4, como transferencia corriente","Capítulo 6, como inversión en personal"],c:1,e:"Aunque las indemnizaciones por razón del servicio (dietas, gastos de locomoción, traslados forzosos) son percepciones del funcionario, se imputan al Capítulo 2 (art. 23 LGP) y NO en nómina (Capítulo 1) — trampa clásica de examen, reguladas por el RD 462/2002."},
{u:5,t:"¿Cuál es el criterio para distinguir si un gasto se imputa al Capítulo 2 o al Capítulo 6?",o:["El importe del gasto, sin más","Si el gasto genera patrimonio amortizable (activo fijo) → Capítulo 6; si no lo genera (gasto de funcionamiento) → Capítulo 2","El número de proveedores implicados","Si el gasto se paga por transferencia bancaria o en efectivo"],c:1,e:"El criterio nuclear es: ¿el gasto genera patrimonio amortizable? Si sí, es inversión real → Capítulo 6. Si es gasto de funcionamiento diario, fungible y no inventariable → Capítulo 2."},
{u:5,t:"¿Cuál es la diferencia conceptual entre transferencias (Cap. 4 y 7) y subvenciones?",o:["No hay diferencia: son sinónimos en la LGP","Las transferencias no están afectadas a una finalidad concreta; las subvenciones sí están afectadas al cumplimiento de un objetivo o actividad concreta y comprobable","Las transferencias solo van a personas físicas; las subvenciones, a personas jurídicas","Las subvenciones nunca requieren justificación"],c:1,e:"Las transferencias (Cap. 4/7) son entregas NO condicionadas, para operaciones no singularizadas. Las subvenciones SÍ están afectadas al cumplimiento de un objetivo o actividad concreta y se rigen por la Ley 38/2003, General de Subvenciones."},
{u:5,t:"Para decidir si una entrega de fondos se imputa al Capítulo 4 (corriente) o al Capítulo 7 (capital), ¿qué hay que preguntarse?",o:["Quién es el beneficiario, sin más criterios","Si el beneficiario destinará los fondos a gastos corrientes (Cap. 4) o a inversión/adquisición de bienes de capital (Cap. 7)","El importe total de la transferencia","Si el beneficiario es una Comunidad Autónoma o no"],c:1,e:"El criterio de distinción Cap. 4 vs. Cap. 7 es el destino de los fondos en el beneficiario: si financia funcionamiento diario → Cap. 4 (corriente); si financia inversión o adquisición de bienes de capital → Cap. 7 (capital). Ejemplo: beca de estudio → Cap. 4 (art. 48); beca de investigación → Cap. 7 (art. 78)."},
{u:5,t:"¿A partir de qué importe una subvención requiere autorización previa del Consejo de Ministros?",o:["A partir de 1.000.000 €","A partir de 5.000.000 €","A partir de 12.000.000 €","No existe ese requisito de autorización"],c:2,e:"Si la subvención supera los 12.000.000 €, se requiere autorización previa del Consejo de Ministros, además de la competencia ordinaria de Ministros, Secretarios de Estado o Presidentes/Directores de OO.AA."},
{u:5,t:"¿Cuál es la naturaleza jurídica del Anticipo de Caja Fija (ACF)?",o:["Es una modificación de crédito presupuestaria","Es una provisión de fondos de carácter EXTRAPRESUPUESTARIO y PERMANENTE a favor de las Cajas Pagadoras","Es un tipo de subvención nominativa","Es un recurso administrativo contra la Intervención"],c:1,e:"El ACF (art. 78 LGP) son provisiones de fondos de carácter extrapresupuestario y permanente para atender gastos corrientes periódicos del Capítulo 2. El traslado inicial de fondos no consume crédito presupuestario; el gasto se formaliza solo al reponer fondos (documento ADOK)."},
{u:5,t:"¿Cuál es el límite cuantitativo global del ACF como regla general, y cuál la excepción de la AECID?",o:["5% del Capítulo 1 en general; 10% para la AECID","7% del crédito total del Capítulo 2 vigente, como regla general; 14% del Cap. 2 para la AECID","10% del presupuesto total; sin excepciones","No existe límite cuantitativo global"],c:1,e:"El límite global del ACF (art. 2.2 RD 725/1989) es, como regla general, el 7% del crédito total del Capítulo 2 vigente. La AECID tiene una excepción específica que eleva este límite al 14% del Cap. 2."},
{u:5,t:"Según los límites por operación individual del ACF (art. 2.3 RD 725/1989, modificado por RD 1469/2001), ¿qué procedimiento corresponde a un gasto de 400 €?",o:["Procedimiento ordinario obligatoriamente","ACF obligatoriamente (está prohibido tramitar libramiento ordinario a perceptores directos por importe inferior a 600 €)","Pago a Justificar obligatoriamente","Cualquiera de los tres procedimientos, libremente"],c:1,e:"Para gastos inferiores a 600 €, el ACF es OBLIGATORIO cuando el sistema esté establecido: está prohibido tramitar libramientos ordinarios a perceptores directos por importes inferiores a 600 €."},
{u:5,t:"¿Cuáles son las cuatro excepciones que permiten pagar por ACF un gasto SUPERIOR a 5.000 € (IVA incluido)?",o:["Cualquier gasto del Capítulo 2 sin excepción de cuantía","Servicios de telecomunicaciones (222), energía eléctrica (221.01), combustibles (221.03) e indemnizaciones por razón del servicio (art. 23)","Solo gastos de personal","Solo gastos en el extranjero"],c:1,e:"Aunque por regla general un gasto superior a 5.000 € debe seguir el procedimiento ordinario, hay 4 excepciones tasadas que permiten pagarlo por ACF: telecomunicaciones (222), energía eléctrica (221.01), combustibles (221.03) e indemnizaciones por razón del servicio (art. 23). Está prohibido fraccionar un gasto para evitar el límite."},
{u:5,t:"¿Cuáles son los tres supuestos tasados que permiten librar un Pago a Justificar (PaJ), conforme al art. 79 LGP?",o:["Cualquier gasto urgente del Capítulo 2","Imposibilidad de aportar documentación justificativa previa, gastos en el extranjero, y ausencia de dependencia ministerial en la localidad donde debe realizarse el gasto","Solo gastos superiores a 100.000 €","Solo gastos de subvenciones nominativas"],c:1,e:"El art. 79 LGP tasa tres supuestos: (1) imposibilidad de acreditar el cumplimiento de la obligación antes del pago (p.ej. expropiaciones), (2) gastos en el extranjero donde la mediación del Tesoro es inviable, y (3) ausencia de dependencia ministerial en la localidad donde se realiza el gasto."},
{u:5,t:"¿Cuáles son los plazos de rendición de la cuenta justificativa de un Pago a Justificar, en la regla general y en el caso de expropiaciones/gastos en el extranjero?",o:["1 mes en todo caso, sin ampliación posible","Regla general: 3 meses, ampliable a 6 meses; expropiaciones y extranjero: 6 meses, ampliable a 12 meses","Siempre 12 meses sin distinción de supuestos","Regla general: 6 meses; expropiaciones: 3 meses"],c:1,e:"Art. 79 LGP: regla general desde la recepción de fondos, 3 meses (ampliable +3 = máximo 6 meses). Para expropiaciones y gastos en el extranjero, 6 meses (ampliable +6 = máximo 12 meses). Quien estableció el sistema (Ministro o Presidente/Director del OA) puede acordar la ampliación."},
{u:5,t:"¿Cuáles son las tres diferencias principales entre el Pago a Justificar (PaJ) y el Anticipo de Caja Fija (ACF)?",o:["No hay diferencias: son el mismo instrumento con dos nombres","El PaJ puede atender gastos de CUALQUIER capítulo (no solo el 2), no tiene límite de cuantía por operación, y no es permanente (cada libramiento responde a una necesidad específica)","El PaJ solo se usa en Organismos Autónomos","El ACF requiere autorización de las Cortes Generales y el PaJ no"],c:1,e:"A diferencia del ACF (limitado al Cap. 2, con límites cuantitativos y de carácter permanente), el PaJ: (1) puede atender gastos de cualquier capítulo, (2) no tiene límite de cuantía por operación, y (3) no es permanente, sino que cada libramiento responde a una necesidad puntual."},
{u:5,t:"¿Qué consecuencia tiene el incumplimiento del plazo de rendición de cuentas en un Pago a Justificar?",o:["Ninguna consecuencia práctica","Se bloquea la expedición de nuevas órdenes de Pago a Justificar a favor del perceptor moroso hasta que justifique las anteriores","Se inicia automáticamente un expediente disciplinario","El gasto se considera nulo de pleno derecho"],c:1,e:"Si no se rinden las cuentas en plazo, se bloquea la expedición de NUEVAS órdenes de Pago a Justificar a favor del perceptor moroso, hasta que justifique las pendientes — es un mecanismo de presión, no una sanción disciplinaria automática."},
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildPool(){
  return BANK.map((q,k)=>{
    const idx=shuffle([0,1,2,3]);
    return{k,u:q.u,t:q.t,opts:idx.map(i=>q.o[i]),correct:idx.indexOf(q.c),e:q.e};
  });
}
let pool=buildPool();
const UNAMES={1:"UD1 · Presupuesto/LGP",2:"UD2 · Leyes anuales",3:"UD3 · Fases del gasto",4:"UD4 · Modificaciones",5:"UD5 · ACF y PaJ"};
const SK="gace_bvi_s1_v1";
let state={unit:0,mode:"all"};
let db=(()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{records:{}};}catch(e){return{records:{}};}})();
function save(){try{localStorage.setItem(SK,JSON.stringify(db));}catch(e){}}
function rec(k){if(!db.records[k])db.records[k]={ok:0,fail:0};return db.records[k];}
function pct(k){const r=rec(k),t=r.ok+r.fail;return t===0?-1:Math.round(r.ok/t*100);}
function ustat(u){
  const idxs=pool.filter(p=>p.u===u).map(p=>p.k);
  let ok=0,fail=0;
  idxs.forEach(k=>{const r=rec(k);ok+=r.ok;fail+=r.fail;});
  const ans=idxs.filter(k=>rec(k).ok+rec(k).fail>0).length;
  return{total:idxs.length,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):-1};
}
function gstat(){
  let ok=0,fail=0,ans=0;
  pool.forEach(p=>{const r=rec(p.k);ok+=r.ok;fail+=r.fail;if(r.ok+r.fail>0)ans++;});
  return{total:pool.length,ok,fail,answered:ans,pct:ok+fail>0?Math.round(ok/(ok+fail)*100):0};
}
function adaptive(unit){
  let items=unit>0?pool.filter(p=>p.u===unit):pool;
  return items.map(p=>{
    const r=rec(p.k),t=r.ok+r.fail;
    let w=t===0?2:(r.ok/t<0.5?4:r.ok/t<0.75?3:r.ok/t<1?2:0.3);
    return{...p,w};
  }).sort((a,b)=>b.w-a.w).slice(0,20);
}
function filtered(){
  let items=state.unit>0?pool.filter(p=>p.u===state.unit):pool;
  if(state.mode==="fail")items=items.filter(p=>rec(p.k).fail>0);
  if(state.mode==="adaptive")items=adaptive(state.unit);
  return items;
}
function renderNav(){
  const tabs=[{v:0,l:"Todas"},...[1,2,3,4,5].map(u=>({v:u,l:"UD"+u}))];
  document.getElementById("nav").innerHTML=tabs.map(t=>`<button class="nb${state.unit==t.v?" active":""}" onclick="setUnit(${t.v})">${t.l}</button>`).join("")
    +`<button class="nb${state.mode==="adaptive"?" active":""}" style="margin-left:auto" onclick="setMode('adaptive')">🎯 Adaptativo</button>`;
}
function renderStats(){
  const g=gstat();
  document.getElementById("stats").innerHTML=`
    <div class="stat"><div class="stat-n">${g.answered}/${g.total}</div><div class="stat-l">Respondidas</div></div>
    <div class="stat"><div class="stat-n" style="color:#0f6e56">${g.ok}</div><div class="stat-l">Correctas</div></div>
    <div class="stat"><div class="stat-n" style="color:#a32d2d">${g.fail}</div><div class="stat-l">Erróneas</div></div>
    <div class="stat"><div class="stat-n">${g.pct}%</div><div class="stat-l">% acierto</div></div>`;
  document.getElementById("prog").style.width=g.pct+"%";
}
function renderUBars(){
  document.getElementById("ubars").innerHTML=[1,2,3,4,5].map(u=>{
    const s=ustat(u);
    const p=s.pct<0?0:s.pct;
    const col=s.pct<0?"#b4b2a9":s.pct<50?"#e24b4a":s.pct<75?"#ef9f27":"#1d9e75";
    return`<div class="ubar" onclick="setUnit(${u})"><div class="ubar-title">${UNAMES[u]}</div><div class="ubar-track"><div class="ubar-fill" style="width:${p}%;background:${col}"></div></div><div class="ubar-pct">${s.pct<0?"sin datos":s.pct+"%"} · ${s.answered}/${s.total}</div></div>`;
  }).join("");
}
function renderCtrl(){
  document.getElementById("ctrl").innerHTML=`
    <button class="btn${state.mode==="all"?" active":""}" onclick="setMode('all')">Todas</button>
    <button class="btn${state.mode==="fail"?" active":""}" onclick="setMode('fail')">Solo erróneas</button>
    <button class="btn${state.mode==="adaptive"?" active":""}" onclick="setMode('adaptive')">🎯 Top 20 adaptativo</button>
    <button class="btn" onclick="reShuf()" title="Rebarajar opciones">🔀 Barajar</button>
    <button class="btn danger" onclick="if(confirm('¿Borrar todo el historial?')){db={records:{}};save();renderAll()}" style="margin-left:auto">Reiniciar</button>`;
}
function renderQuestions(){
  const items=filtered();
  if(!items.length){document.getElementById("questions").innerHTML=`<div class="empty">No hay preguntas en este filtro.</div>`;return;}
  let prev=null,html="";
  items.forEach(p=>{
    if(state.unit===0&&p.u!==prev){html+=`<div class="sep">${UNAMES[p.u]}</div>`;prev=p.u;}
    const r=rec(p.k),pc=pct(p.k);
    const badge=pc<0?"":
      `<span class="qpct" style="background:${pc>=75?"#eaf3de":pc>=50?"#faeeda":"#fcebeb"};color:${pc>=75?"#0f6e56":pc>=50?"#854f0b":"#a32d2d"}">${pc}% (${r.ok+r.fail}v)</span>`;
    html+=`<div class="qcard" id="qc-${p.k}">
      <div class="qhead"><span class="qbadge">${UNAMES[p.u]}</span><div class="qmeta">${badge}<span class="qnum">#${p.k+1}</span></div></div>
      <div class="qtext">${p.t}</div>
      <div class="opts">${p.opts.map((o,i)=>`<button class="opt" id="o-${p.k}-${i}" onclick="answer(${p.k},${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join("")}</div>
      <div id="ex-${p.k}"></div>
    </div>`;
  });
  document.getElementById("questions").innerHTML=html;
}
function answer(k,chosen){
  const p=pool[k],ok=chosen===p.correct,r=rec(k);
  if(ok)r.ok++;else r.fail++;
  save();
  document.getElementById("qc-"+k).classList.add(ok?"ok":"fail");
  for(let i=0;i<p.opts.length;i++){
    const b=document.getElementById("o-"+k+"-"+i);
    b.disabled=true;
    if(i===p.correct)b.classList.add("c-ok");
    if(i===chosen&&!ok)b.classList.add("c-fail");
  }
  document.getElementById("ex-"+k).innerHTML=`<div class="exp"><strong style="color:${ok?"#0f6e56":"#a32d2d"}">${ok?"✓ Correcto":"✗ Incorrecto"}</strong> ${p.e}</div>`;
  renderStats();renderUBars();
}
function setUnit(u){state.unit=parseInt(u);if(state.mode!=="adaptive")state.mode="all";renderAll();}
function setMode(m){state.mode=m;renderCtrl();renderQuestions();}
function reShuf(){pool=buildPool();renderAll();}
function renderAll(){renderNav();renderStats();renderUBars();renderCtrl();renderQuestions();}
renderAll();
</script>
</body>
</html>
